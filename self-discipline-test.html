<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Self-Discipline & Consistency Matrix - ToolsQuark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 750px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { background: #4b5563; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
    .back-btn:hover { background: #1f2937; }
    .progress-container { width: 100%; background: #e5e7eb; height: 6px; border-radius: 3px; margin-bottom: 35px; overflow: hidden; }
    .progress-bar { height: 100%; background: #2563eb; width: 0%; transition: width 0.3s ease; }
    .question-box h3 { font-size: 22px; margin-bottom: 25px; line-height: 1.4; color: #111827; }
    .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
    .option-item { background: white; border: 1px solid #e5e7eb; padding: 18px 24px; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 16px; font-weight: 500; }
    .option-item:hover { border-color: #2563eb; background: #f0f5ff; transform: translateX(4px); }
    .result-box { display: none; text-align: center; }
    .metric-circle { width: 130px; height: 130px; border-radius: 50%; background: #2563eb; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 25px; box-shadow: 0 10px 20px rgba(37,99,235,0.2); }
    .metric-value { font-size: 38px; font-weight: bold; }
    .metric-label { font-size: 12px; opacity: 0.9; }
    .result-title { font-size: 26px; font-weight: bold; margin-bottom: 15px; }
    .result-interpretation { font-size: 15px; color: #4b5563; line-height: 1.6; text-align: left; background: #f8fafc; padding: 20px; border-radius: 12px; border-left: 4px solid #2563eb; margin-bottom: 30px; }
    .faq-container { width: 100%; max-width: 750px; margin-top: 40px; border-top: 1px solid #d1d5db; padding-top: 40px; }
    .faq-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #111827; }
    .faq-item { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255,255,255,0.4); border-radius: 12px; margin-bottom: 14px; padding: 20px; }
    .faq-q { font-size: 16px; font-weight: bold; color: #1f2937; margin-bottom: 8px; }
    .faq-a { font-size: 14px; color: #4b5563; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-block"><h2>Self-Discipline Test</h2><a href="index.html" class="back-btn">← Back</a></div>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div id="quizInterface"><div class="question-box"><h3 id="questionText">Loading...</h3><div class="options-list" id="optionsWrapper"></div></div></div>
    <div class="result-box" id="resultInterface">
      <div class="metric-circle"><div class="metric-value" id="finalScore">0</div><div class="metric-label">TOTAL SCORE</div></div>
      <h3 class="result-title" id="analysisTitle"></h3><div class="result-interpretation" id="analysisText"></div>
      <a href="index.html" class="back-btn" style="background:#2563eb; padding:12px 30px; font-size:16px;">Return to Ecosystem</a>
    </div>
  </div>

  <section class="faq-container">
    <h3 class="faq-title">Frequently Asked Questions (FAQ)</h3>
    <div class="faq-item">
      <div class="faq-q">💡 What parameters are generated?</div>
      <div class="faq-a">This tracks your executive framework consistency, short-term impulse inhibition resilience, and strategic focus parameters.</div>
    </div>
  </section>

  <script>
    const questions = [
      "Struggled to sustain multi-hour focus matrices on analytical tasks when alternative distractions exist?",
      "Abandoned long-range fitness, skill-acquisition, or financial regimens within the initial 14-day cycle?",
      "Allowed instant notifications or micro-dopamine triggers to derail scheduled blocks of deep work?",
      "Failed to adhere to self-directed chronological sleep schedules or early morning routines?",
      "Neglected core structural preparation, preferring immediate low-effort comfort optimization?",
      "Felt that your operational consistency relies heavily on temporary inspiration rather than structured systemization?",
      "Experienced significant difficulty breaking cyclical unhealthy nutritional or digital habits?",
      "Abandoned primary objectives completely when facing minor systemic resistance or friction?",
      "Failed to establish daily target parameters or document your milestone execution metrics?",
      "Struggled to maintain emotional regulation and behavioral stability under prolonged focus demands?"
    ];
    const interpretations = [
      { bound: 10, title: "Compounded Chaos Hazard (Low Discipline)", text: "Your executive control parameters show systematic vulnerability to short-term temptation vectors. Immediate external structures are recommended." },
      { bound: 20, title: "Fluctuating Focus Resiliency (Moderate Discipline)", text: "Your execution parameters are functional but vulnerable. Consistency relies heavily on clear short-term environments." },
      { bound: 30, title: "Elite Executive Core (Exceptional Discipline)", text: "Your internal regulatory frameworks are highly optimized. Long-range focus parameters indicate superior resilience." }
    ];
    const options = ["0 - Never", "1 - Sometimes", "2 - Often", "3 - Continuously"];
    let idx = 0, score = 0;
    function render() {
      document.getElementById("progressBar").style.width = (idx / questions.length) * 100 + "%";
      document.getElementById("questionText").textContent = `${idx + 1}. ${questions[idx]}`;
      const wrapper = document.getElementById("optionsWrapper"); wrapper.innerHTML = "";
      options.forEach((opt, w) => {
        const d = document.createElement("div"); d.className = "option-item"; d.textContent = opt;
        d.onclick = () => { score += w; idx++; if(idx < questions.length) { render(); } else { showResult(); } };
        wrapper.appendChild(d);
      });
    }
    function showResult() {
      document.getElementById("quizInterface").style.display = "none";
      document.getElementById("resultInterface").style.display = "block";
      document.getElementById("progressBar").style.width = "100%";
      document.getElementById("finalScore").textContent = score;
      let target = interpretations.find(i => score <= i.bound) || interpretations[2];
      document.getElementById("analysisTitle").textContent = target.title;
      document.getElementById("analysisText").textContent = target.text;
    }
    render();
  </script>
</body>
</html>
