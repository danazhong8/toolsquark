<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TDEE Calculator - ToolsQuark</title>
  <meta name="description" content="Determine your precise daily maintenance calorie thresholds using Mifflin-St Jeor or advanced Katch-McArdle lean mass algorithms alongside detailed macronutrient tier targeting.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 750px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { text-decoration: none; color: #4b5563; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.5); transition: background 0.2s; min-height: 48px; }
    .back-btn:hover { background: #fff; }
    h1 { font-size: 24px; font-weight: bold; color: #111827; }
    .progress-container { width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { width: 50%; height: 100%; background: #6366f1; transition: width 0.3s ease; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 12px; background: #fff; font-size: 16px; color: #111827; outline: none; min-height: 48px; }
    input[type="number"]:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .radio-group { display: flex; gap: 12px; }
    .radio-tile { flex: 1; display: flex; align-items: center; justify-content: center; padding: 12px; border: 1px solid #d1d5db; border-radius: 12px; cursor: pointer; background: #fff; transition: all 0.2s; min-height: 48px; }
    .radio-group input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .radio-group input[type="radio"]:checked + .radio-tile { border-color: #6366f1; background: rgba(99,102,241,0.05); color: #6366f1; font-weight: bold; }
    .btn-submit { width: 100%; padding: 16px; background: #6366f1; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; min-height: 48px; margin-top: 10px; }
    .btn-submit:hover { background: #4f46e5; }
    .result-card { display: none; text-align: center; animation: fadeIn 0.4s ease-out; }
    .score-badge { font-size: 52px; font-weight: 800; color: #6366f1; margin: 10px 0; }
    .analysis-text { color: #4b5563; font-size: 15px; line-height: 1.6; text-align: left; background: rgba(255,255,255,0.6); padding: 20px; border-radius: 16px; border: 1px solid #e5e7eb; margin-bottom: 25px; }
    
    /* 大营养素宏观卡片排版 */
    .macro-container { display: flex; gap: 12px; margin: 20px 0; text-align: left; }
    .macro-box { flex: 1; padding: 15px; border-radius: 14px; border: 1px solid #e5e7eb; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    .macro-box.protein { border-left: 5px solid #ef4444; }
    .macro-box.carbs { border-left: 5px solid #f59e0b; }
    .macro-box.fat { border-left: 5px solid #10b981; }
    .macro-title { font-size: 12px; font-weight: bold; color: #6b7280; text-transform: uppercase; margin-bottom: 4px; }
    .macro-value { font-size: 20px; font-weight: 700; color: #111827; }
    
    .btn-reset { padding: 12px 24px; background: #6b7280; color: #fff; border: none; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; min-height: 45px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <main class="container">
    <div class="header-block">
      <a href="index.html" class="back-btn">← Back to Hub</a>
      <h1>Advanced TDEE Engine</h1>
    </div>
    <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>

    <div id="quizInterface">
      <div class="form-group">
        <label>Biological Sex Alignment</label>
        <div class="radio-group">
          <label style="flex:1;"><input type="radio" name="gender" value="male" checked><div class="radio-tile">Male</div></label>
          <label style="flex:1;"><input type="radio" name="gender" value="female"><div class="radio-tile">Female</div></label>
        </div>
      </div>

      <div class="form-group" style="display:flex; gap:12px;">
        <div style="flex:1;">
          <label for="age">Age (Years)</label>
          <input type="number" id="age" value="28" min="1" max="120">
        </div>
        <div style="flex:1;">
          <label for="height">Height (cm)</label>
          <input type="number" id="height" value="175" min="50" max="260">
        </div>
      </div>

      <div class="form-group" style="display:flex; gap:12px;">
        <div style="flex:1;">
          <label for="weight">Current Weight (kg)</label>
          <input type="number" id="weight" value="70" min="20" max="350">
        </div>
        <div style="flex:1;">
          <label for="bodyfat">Body Fat % (Optional)</label>
          <input type="number" id="bodyfat" placeholder="e.g. 18" min="2" max="60">
        </div>
      </div>

      <div class="form-group">
        <label for="activity">Weekly Physical Activity Multiplier</label>
        <select id="activity">
          <option value="1.2">Sedentary (Desk Job, Zero Programmatic Exercise)</option>
          <option value="1.375">Lightly Active (Light Movement / Sports 1-3 days/wk)</option>
          <option value="1.55">Moderately Active (Structured Training / Sports 3-5 days/wk)</option>
          <option value="1.725">Very Active (Heavy Muscular Loading / Sports 6-7 days/wk)</option>
        </select>
      </div>

      <button class="btn-submit" onclick="calculateTDEE()">Deconstruct Metabolic Footprint</button>
    </div>

    <div id="resultInterface" class="result-card">
      <p style="font-size:14px; text-transform:uppercase; letter-spacing:1px; color:#6b7280; font-weight:600;">Daily Maintenance Equilibrium</p>
      <div id="finalScore" class="score-badge">0 kcal</div>
      
      <p style="text-align:left; font-size:14px; font-weight:700; color:#4b5563; margin-top:15px;">Balanced Blueprint Split (Daily Grams):</p>
      <div class="macro-container">
        <div class="macro-box protein">
          <div class="macro-title">Protein (30%)</div>
          <div id="macroProtein" class="macro-value">0g</div>
        </div>
        <div class="macro-box carbs">
          <div class="macro-title">Carbs (40%)</div>
          <div id="macroCarbs" class="macro-value">0g</div>
        </div>
        <div class="macro-box fat">
          <div class="macro-title">Fat (30%)</div>
          <div id="macroFat" class="macro-value">0g</div>
        </div>
      </div>

      <div id="analysisText" class="analysis-text"></div>
      <button class="btn-reset" onclick="resetTDEE()">Run New Profiling</button>
    </div>
  </main>

  <script>
    function calculateTDEE() {
      let gender = document.querySelector('input[name="gender"]:checked').value;
      let age = parseFloat(document.getElementById('age').value) || 28;
      let weight = parseFloat(document.getElementById('weight').value) || 70;
      let height = parseFloat(document.getElementById('height').value) || 175;
      let multiplier = parseFloat(document.getElementById('activity').value) || 1.2;
      let bodyfat = parseFloat(document.getElementById('bodyfat').value);
      
      let bmr = 0;
      let algorithmUsed = "";
      
      // 智能分流公式体系
      if (!isNaN(bodyfat) && bodyfat > 0) {
        // 如果输入了体脂率，无缝激活对高肌肉或肥胖人群最为精准的 Katch-McArdle 公式
        let leanMass = weight * (1 - (bodyfat / 100));
        bmr = 370 + (21.6 * leanMass);
        algorithmUsed = "Advanced Katch-McArdle (Lean Tissue Driven Model)";
      } else {
        // 经典常规 Mifflin-St Jeor 公式
        if (gender === 'male') {
          bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
        } else {
          bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
        }
        algorithmUsed = "Standard Mifflin-St Jeor Baseline Model";
      }
      
      let tdee = Math.round(bmr * multiplier);
      
      // 宏量营养素克数计算逻辑 (经典健身 40%碳水 : 30%蛋白质 : 30%脂肪 配比架构)
      // 蛋白 4kcal/g, 碳水 4kcal/g, 脂肪 9kcal/g
      let pGrams = Math.round((tdee * 0.30) / 4);
      let cGrams = Math.round((tdee * 0.40) / 4);
      let fGrams = Math.round((tdee * 0.30) / 9);
      
      document.getElementById('quizInterface').style.display = 'none';
      document.getElementById('resultInterface').style.display = 'block';
      document.getElementById('progressBar').style.width = '100%';
      
      document.getElementById('finalScore').textContent = tdee + " kcal / day";
      document.getElementById('macroProtein').textContent = pGrams + "g";
      document.getElementById('macroCarbs').textContent = cGrams + "g";
      document.getElementById('macroFat').textContent = fGrams + "g";
      
      document.getElementById('analysisText').innerHTML = "<strong>Engine Log:</strong> Evaluated using the <em>" + algorithmUsed + "</em>. Your critical metabolic floor (BMR) sits at " + Math.round(bmr) + " calories. Multiplying your physical output constants yields an energy balance ceiling of " + tdee + " kcal. <br><br><strong>Application:</strong> To trigger body fat systemic oxidation (Cutting), target <strong>" + (tdee - 500) + " kcal</strong>. For clear dry muscular tissue accretion (Lean Bulking), target an intake parameter of <strong>" + (tdee + 250) + " kcal</strong>.";
    }

    function resetTDEE() {
      document.getElementById('resultInterface').style.display = 'none';
      document.getElementById('quizInterface').style.display = 'block';
      document.getElementById('progressBar').style.width = '50%';
    }
  </script>
</body>
</html>
