<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Steps Goal Calculator - ToolsQuark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 580px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { background: #4b5563; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
    .back-btn:hover { background: #1f2937; }
    
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #4b5563; }
    .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; outline: none; }
    
    .calc-btn { width: 100%; background: #2563eb; color: white; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .calc-btn:hover { background: #1d4ed8; }
    
    .result-box { display: none; text-align: center; }
    .metric-display { background: #10b981; color: white; padding: 20px; border-radius: 16px; font-size: 32px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(16,185,129,0.15); }
    .result-interpretation { font-size: 14px; color: #4b5563; line-height: 1.6; text-align: left; background: #f8fafc; padding: 20px; border-radius: 16px; border-left: 4px solid #10b981; margin-bottom: 25px; }
    .action-buttons { display: flex; justify-content: center; gap: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="inputInterface">
      <div class="header-block"><h2>Daily Steps Target</h2><a href="index.html" class="back-btn">← Back</a></div>
      <div class="input-group">
        <label>Current Average Daily Steps</label>
        <input type="number" id="currentSteps" placeholder="e.g. 4000" min="0">
      </div>
      <div class="input-group">
        <label>Your Primary Fitness Target</label>
        <select id="goalType">
          <option value="6000">Active Baseline & Health Maintenance</option>
          <option value="10000">Accelerated Fat Loss & Caloric Expenditure</option>
          <option value="12000">High Stamina & Aerobic Conditioning</option>
        </select>
      </div>
      <button class="calc-btn" onclick="calculateStepGoal()">Optimize Step Goal</button>
    </div>

    <div class="result-box" id="resultInterface">
      <div class="metric-display" id="finalScore">7,000 Steps</div>
      <h3 style="font-size:20px; margin-bottom:12px;">Your Adaptive Daily Milestone</h3>
      <div class="result-interpretation" id="analysisText"></div>
      <div class="action-buttons">
        <button onclick="resetCalc()" class="back-btn" style="background:#4b5563; padding:12px 24px; font-size:15px; font-weight:bold;">Readjust Plan</button>
        <a href="index.html" class="back-btn" style="background:#2563eb; padding:12px 28px; font-size:15px; font-weight:bold;">Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    function calculateStepGoal() {
      let targetBase = parseInt(document.getElementById('goalType').value) || 8000;
      let currentBase = parseInt(document.getElementById('currentSteps').value) || 4000;
      
      let stepGoal = targetBase;
      if (stepGoal > currentBase + 3000) {
        stepGoal = currentBase + 3000; 
      }
      
      document.getElementById('finalScore').textContent = stepGoal.toLocaleString() + " Steps / Day";
      document.getElementById('analysisText').innerHTML = `📢 <b>Plain English Summary:</b> Jump-starting activity metrics too quickly risks joint fatigue. To keep your habits injury-free, your customized milestone is safely mapped to <b>${stepGoal.toLocaleString()} steps</b>.\n\n<br>💡 <b>Actionable Tracking Tip:</b> Try hitting this baseline consistently for 10 straight days. Once comfortable, raise the boundary scale by an additional 1,000 steps smoothly to boost daily metabolic active curves.`;
      
      document.getElementById('inputInterface').style.display = 'none';
      document.getElementById('resultInterface').style.display = 'block';
    }

    function resetCalc() {
      document.getElementById('inputInterface').style.display = 'block';
      document.getElementById('resultInterface').style.display = 'none';
    }
  </script>
</body>
</html>
