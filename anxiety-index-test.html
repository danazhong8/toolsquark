<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anxiety Index Pro Assessment</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; color: #1f2937; padding: 20px; }
    .card { background: white; border-radius: 20px; padding: 30px; max-width: 700px; margin: 20px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    .hidden { display: none; }
    /* 维度条样式 */
    .dimension-bar { height: 10px; background: #e5e7eb; border-radius: 5px; margin: 10px 0; overflow: hidden; }
    .dimension-fill { height: 100%; background: #2563eb; width: 0%; transition: width 1s ease-out; }
    .btn { cursor: pointer; padding: 12px 24px; border-radius: 8px; border: none; background: #2563eb; color: white; font-weight: bold; }
  </style>
</head>
<body>

<div class="card" id="quizInterface">
  <h2 id="qTitle">Anxiety Assessment</h2>
  <div id="optionsWrapper"></div>
</div>

<div class="card hidden" id="resultInterface">
  <h2 id="analysisTitle" style="text-align:center;">Your Neural Profile</h2>
  <div style="font-size: 40px; font-weight: bold; text-align: center; color: #2563eb;" id="finalScore">0</div>
  
  <div id="dimensionAnalysis">
    <p><strong>Physiological Stability</strong></p><div class="dimension-bar"><div class="dimension-fill" id="bar1"></div></div>
    <p><strong>Thought Loop Control</strong></p><div class="dimension-bar"><div class="dimension-fill" id="bar2"></div></div>
    <p><strong>Emotional Regulation</strong></p><div class="dimension-bar"><div class="dimension-fill" id="bar3"></div></div>
  </div>

  <div id="actionableAdvice" style="margin: 20px 0; padding: 15px; background: #eff6ff; border-left: 4px solid #2563eb;"></div>
  
  <div style="display:flex; gap:10px;">
    <button class="btn" onclick="window.print()">Save/Print Report</button>
    <button class="btn" style="background: #10b981;" onclick="alert('Shared to your feed!')">Share Results</button>
  </div>
</div>

<script>
  let score = 0;
  // 模拟题目数据及维度加权 (0: 生理, 1: 思维, 2: 调节)
  const questions = [
    {q: "Muscle constriction/jaw clenching?", dim: 0},
    {q: "Intrusive negative thought loops?", dim: 1},
    {q: "Irritable under multi-tasking?", dim: 2}
  ];

  function showResult() {
    document.getElementById("quizInterface").classList.add("hidden");
    document.getElementById("resultInterface").classList.remove("hidden");
    
    // 更新得分与动态维度条
    document.getElementById("finalScore").textContent = score;
    document.getElementById("bar1").style.width = (Math.random() * 80 + 20) + "%"; // 模拟维度数据
    document.getElementById("bar2").style.width = (Math.random() * 80 + 20) + "%";
    document.getElementById("bar3").style.width = (Math.random() * 80 + 20) + "%";

    // 智能化建议
    const advice = score < 5 ? 
      "Keep it up! Your baseline is stable. Recommendation: Practice 5-min mindfulness daily to maintain this homeostatic balance." :
      "We notice some strain. Recommendation: Try the 4-7-8 breathing technique or consult our expert guide on 'Neuro-Regulation'.";
    document.getElementById("actionableAdvice").innerHTML = advice + "<br><small>Disclaimer: This is not a clinical diagnosis.</small>";
  }

  // 简易渲染逻辑 (此处简化，实际应用可对接循环)
  renderQuestion(0);
  function renderQuestion(i) {
    document.getElementById("qTitle").textContent = questions[i].q;
    const w = document.getElementById("optionsWrapper"); w.innerHTML = "";
    [0,1,2,3].forEach(v => {
      let d = document.createElement("div"); d.className = "dimension-bar"; d.style.padding = "10px"; d.textContent = v;
      d.onclick = () => { score += v; i < questions.length-1 ? renderQuestion(i+1) : showResult(); };
      w.appendChild(d);
    });
  }
</script>

</body>
</html>
