<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BMI Calculator - ToolsQuark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 550px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { background: #4b5563; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
    .back-btn:hover { background: #1f2937; }
    
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #4b5563; }
    .input-group input { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; outline: none; font-size: 16px; }
    .input-group input:focus { border-color: #2563eb; }
    
    .calc-btn { width: 100%; background: #2563eb; color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
    .calc-btn:hover { background: #1d4ed8; }
    
    .result-box { display: none; text-align: center; margin-top: 10px; }
    .metric-circle { width: 130px; height: 130px; border-radius: 50%; background: #2563eb; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(37,99,235,0.2); }
    .metric-value { font-size: 34px; font-weight: bold; }
    .metric-label { font-size: 11px; opacity: 0.9; }
    
    .result-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
    .result-interpretation { font-size: 14px; color: #4b5563; line-height: 1.6; text-align: left; background: #f8fafc; padding: 20px; border-radius: 16px; border-left: 4px solid #2563eb; margin-bottom: 25px; }
    
    .action-buttons { display: flex; justify-content: center; gap: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="inputInterface">
      <div class="header-block"><h2>BMI Calculator</h2><a href="index.html" class="back-btn">← Back</a></div>
      <div class="input-group">
        <label>Height (cm)</label>
        <input type="number" id="height" placeholder="e.g. 175" min="50" max="250">
      </div>
      <div class="input-group">
        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70" min="10" max="300">
      </div>
      <button class="calc-btn" onclick="calculateBMI()">Calculate Metrics</button>
    </div>

    <div class="result-box" id="resultInterface">
      <div class="metric-circle">
        <div class="metric-value" id="bmiValue">0.0</div>
        <div class="metric-label">YOUR BMI</div>
      </div>
      <h3 class="result-title" id="bmiCategory">Normal Weight</h3>
      <div class="result-interpretation" id="adviceText"></div>
      
      <div class="action-buttons">
        <button onclick="resetCalc()" class="back-btn" style="background:#4b5563; padding:12px 24px; font-size:15px; font-weight:bold;">Recalculate</button>
        <a href="index.html" class="back-btn" style="background:#2563eb; padding:12px 28px; font-size:15px; font-weight:bold;">Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    function calculateBMI() {
      const height = parseFloat(document.getElementById("height").value);
      const weight = parseFloat(document.getElementById("weight").value);
      
      if (!height || !weight || height <= 0 || weight <= 0) {
        alert("Please enter valid parameters.");
        return;
      }
      
      const bmi = weight / ((height / 100) * (height / 100));
      document.getElementById("bmiValue").textContent = bmi.toFixed(1);
      
      let cat = ""; let adv = "";
      if (bmi < 18.5) {
        cat = "Underweight Baseline";
        adv = "📢 Summary: Your weight is lower than clinically recommended for your height profile.\n\n💡 Action Tip: Focus on nutrient-dense calorie tracking and gradual resistance training to build lean skeletal mass safely.";
      } else if (bmi < 25) {
        cat = "Optimal Healthy Weight";
        adv = "📢 Summary: Your Body Mass Index falls squarely inside the ideal healthy epidemiological envelope.\n\n💡 Action Tip: Keep up your balanced physical activity levels and stable daily protein intake patterns.";
      } else if (bmi < 30) {
        cat = "Overweight Profile";
        adv = "📢 Summary: Your score indicates mild to moderate excess tissue accumulation relative to stature.\n\n💡 Action Tip: Incorporate structured cardiovascular exercises and mindful portion tracking to regulate systemic baseline trends.";
      } else {
        cat = "Obese Category Alert";
        adv = "📢 Summary: Your anthropometric metrics show high tissue accumulation density ranges.\n\n💡 Action Tip: Consider consulting a health professional or nutritional guide to map long-range fat distribution targets smoothly.";
      }
      
      document.getElementById("bmiCategory").textContent = cat;
      document.getElementById("adviceText").innerText = adv;
      document.getElementById("inputInterface").style.display = "none";
      document.getElementById("resultInterface").style.display = "block";
    }

    function resetCalc() {
      document.getElementById("inputInterface").style.display = "block";
      document.getElementById("resultInterface").style.display = "none";
    }
  </script>
</body>
</html>
