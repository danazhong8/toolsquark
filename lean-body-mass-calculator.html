<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lean Body Mass Calculator - Pure Structural Weight Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 650px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { text-decoration: none; color: #4b5563; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.5); min-height: 48px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 12px; background: #fff; font-size: 16px; outline: none; min-height: 48px; }
    .radio-group { display: flex; gap: 12px; }
    .radio-tile { flex: 1; display: flex; align-items: center; justify-content: center; padding: 12px; border: 1px solid #d1d5db; border-radius: 12px; cursor: pointer; background: #fff; min-height: 48px; }
    .radio-group input[type="radio"] { position: absolute; opacity: 0; }
    .radio-group input[type="radio"]:checked + .radio-tile { border-color: #3b82f6; background: rgba(59,130,246,0.05); color: #3b82f6; font-weight: bold; }
    .btn-submit { width: 100%; padding: 16px; background: #3b82f6; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; min-height: 48px; margin-top: 10px; }
    
    .result-box { display: none; text-align: center; }
    .metrics-summary { display: flex; gap: 12px; margin-bottom: 25px; text-align: left; }
    .metric-card { flex: 1; padding: 15px; border-radius: 14px; border: 1px solid #e5e7eb; background: #fff; border-top: 4px solid #3b82f6; }
    .metric-card.alt { border-top: 4px solid #10b981; }
    .card-title { font-size: 11px; font-weight: bold; color: #6b7280; text-transform: uppercase; margin-bottom: 4px; }
    .card-val { font-size: 22px; font-weight: 700; color: #111827; }
    
    .interpretation-panel { font-size: 14px; color: #4b5563; line-height: 1.6; text-align: left; background: #f8fafc; padding: 20px; border-radius: 16px; border-left: 4px solid #3b82f6; margin-bottom: 25px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="inputInterface">
      <div class="header-block"><h2>Lean Body Mass</h2><a href="index.html" class="back-btn">← Back</a></div>
      <div class="form-group">
        <label>Biological Sex</label>
        <div class="radio-group">
          <label style="flex:1;"><input type="radio" name="gender" value="male" checked><div class="radio-tile">Male</div></label>
          <label style="flex:1;"><input type="radio" name="gender" value="female"><div class="radio-tile">Female</div></label>
        </div>
      </div>
      <div class="form-group" style="display:flex; gap:12px;">
        <div style="flex:1;">
          <label for="height">Height (cm)</label>
          <input type="number" id="height" value="175" min="100" max="250">
        </div>
        <div style="flex:1;">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" value="70" min="30" max="300">
        </div>
      </div>
      <button class="btn-submit" onclick="calculateLBM()">Isolate Lean Mass</button>
    </div>

    <div class="result-box" id="resultInterface">
      <div class="header-block"><h2>Structural Tissue Split</h2></div>
      <div class="metrics-summary">
        <div class="metric-card">
          <div class="card-title">Lean Body Mass (Boer)</div>
          <div id="lbmValue" class="card-val">0.0 kg</div>
        </div>
        <div class="metric-card alt">
          <div class="card-title">Estimated Body Fat %</div>
          <div id="fatPctValue" class="card-val">0.0%</div>
        </div>
      </div>
      <div id="adviceText" class="interpretation-panel"></div>
      <button onclick="resetCalc()" class="btn-submit" style="background:#6b7280;">Recalculate Metrics</button>
    </div>
  </div>

  <script>
    function calculateLBM() {
      let gender = document.querySelector('input[name="gender"]:checked').value;
      let w = parseFloat(document.getElementById('weight').value) || 70;
      let h = parseFloat(document.getElementById('height').value) || 175;
      
      let lbmBoer = 0; let lbmJames = 0;
      // 引入 Boer 与 James 经典公式体系双向交叉校准
      if (gender === 'male') {
        lbmBoer = (0.407 * w) + (0.267 * h) - 19.2;
        lbmJames = (1.1 * w) - (128 * (w * w) / (h * h));
      } else {
        lbmBoer = (0.252 * w) + (0.473 * h) - 48.3;
        lbmJames = (1.07 * w) - (148 * (w * w) / (h * h));
      }
      
      let lbmFinal = Math.max(30, Math.min(w, (lbmBoer + lbmJames) / 2));
      let fatMass = Math.max(0, w - lbmFinal);
      let fatPct = (fatMass / w) * 100;
      
      // 蛋白质核心合成热量推荐 (基于 2.0g/kg 去脂体重标准系数)
      let proteinTarget = Math.round(lbmFinal * 2);
      
      document.getElementById('lbmValue').textContent = lbmFinal.toFixed(1) + " kg";
      document.getElementById('fatPctValue').textContent = fatPct.toFixed(1) + "%";
      
      document.getElementById('adviceText').innerHTML = `📢 <b>Plain English Summary:</b> Your absolute non-fat structural weight (comprising visceral skeletal muscle tissue, bone architecture, and essential cellular fluids) isolates to <b>${lbmFinal.toFixed(1)} kg</b>, leaving a net fat mass index of <b>${fatMass.toFixed(1)} kg</b>.<br><br>💡 <b>Actionable Strategy:</b> To systematically support lean muscle expansion while safeguarding this structural mass, aim for a daily baseline protein ingestion target of approximately <b>${proteinTarget} grams</b> combined with high-tension lifting blocks.`;
      
      document.getElementById('inputInterface').style.display = 'none';
      document.getElementById('resultInterface').style.display = 'block';
    }

    function resetCalc() {
      document.getElementById('inputInterface').style.display = 'block';
      document.getElementById('resultInterface').style.display = 'none';
    }
  </script>
</body>
</html>
