<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Body Fat Calculator - ToolsQuark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { background: #4b5563; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
    .back-btn:hover { background: #1f2937; }
    
    .input-group { margin-bottom: 16px; text-align: left; }
    .input-group label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; color: #4b5563; }
    .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; outline: none; }
    .radio-group { display: flex; gap: 20px; padding: 4px 0; }
    
    .calc-btn { width: 100%; background: #2563eb; color: white; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .calc-btn:hover { background: #1d4ed8; }
    
    .result-box { display: none; text-align: center; }
    .metric-circle { width: 130px; height: 130px; border-radius: 50%; background: #2563eb; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(37,99,235,0.2); }
    .metric-value { font-size: 32px; font-weight: bold; }
    .metric-label { font-size: 11px; opacity: 0.9; }
    
    .result-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
    .result-interpretation { font-size: 14px; color: #4b5563; line-height: 1.6; text-align: left; background: #f8fafc; padding: 20px; border-radius: 16px; border-left: 4px solid #2563eb; margin-bottom: 25px; }
    .action-buttons { display: flex; justify-content: center; gap: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="inputInterface">
      <div class="header-block"><h2>Body Fat Calculator</h2><a href="index.html" class="back-btn">← Back</a></div>
      <div class="input-group">
        <label>Biological Sex</label>
        <div class="radio-group">
          <label style="font-weight:normal;"><input type="radio" name="sex" id="male" checked onchange="toggleHip()"> Male</label>
          <label style="font-weight:normal;"><input type="radio" name="sex" id="female" onchange="toggleHip()"> Female</label>
        </div>
      </div>
      <div class="input-group">
        <label>Height (cm)</label>
        <input type="number" id="height" placeholder="175">
      </div>
      <div class="input-group">
        <label>Neck Circumference (cm)</label>
        <input type="number" id="neck" placeholder="38">
      </div>
      <div class="input-group">
        <label>Waist Circumference (cm)</label>
        <input type="number" id="waist" placeholder="85">
      </div>
      <div class="input-group" id="hipGroup" style="display:none;">
        <label>Hip Circumference (cm)</label>
        <input type="number" id="hip" placeholder="95">
      </div>
      <button class="calc-btn" onclick="calculateBodyFat()">Run Navy Formula</button>
    </div>

    <div class="result-box" id="resultInterface">
      <div class="metric-circle">
        <div class="metric-value" id="bfpValue">0.0%</div>
        <div class="metric-label">BODY FAT %</div>
      </div>
      <h3 class="result-title" id="bfpCategory">Normal Baseline</h3>
      <div class="result-interpretation" id="adviceText"></div>
      <div class="action-buttons">
        <button onclick="resetCalc()" class="back-btn" style="background:#4b5563; padding:12px 24px; font-size:15px; font-weight:bold;">Recalculate</button>
        <a href="index.html" class="back-btn" style="background:#2563eb; padding:12px 28px; font-size:15px; font-weight:bold;">Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    function toggleHip() {
      document.getElementById("hipGroup").style.display = document.getElementById("female").checked ? "block" : "none";
    }

    function calculateBodyFat() {
      const height = parseFloat(document.getElementById("height").value);
      const neck = parseFloat(document.getElementById("neck").value);
      const waist = parseFloat(document.getElementById("waist").value);
      const isMale = document.getElementById("male").checked;
      
      if (!height || !neck || !waist || height <= 0 || neck <= 0 || waist <= 0) {
        alert("Please input positive values."); return;
      }

      let bfp = 0;
      if (isMale) {
        if (waist <= neck) { alert("Waist must be larger than neck measurement."); return; }
        bfp = 495 / (1.0324 - 0.19077 * Math.log10(waist - neck) + 0.15456 * Math.log10(height)) - 450;
      } else {
        const hip = parseFloat(document.getElementById("hip").value) || 0;
        if (!hip || hip <= 0 || (waist + hip) <= neck) { alert("Please provide correct hip parameters."); return; }
        bfp = 495 / (1.29579 - 0.35004 * Math.log10(waist + hip - neck) + 0.22100 * Math.log10(height)) - 450;
      }

      if (bfp < 2) bfp = 2; if (bfp > 60) bfp = 60;
      const finalBFP = bfp.toFixed(1);
      document.getElementById("bfpValue").textContent = `${finalBFP}%`;

      let category = bfp < 18 ? "Lean / Athletic Track" : bfp < 25 ? "Optimal Fitness Zone" : "Elevated Adiposity Profile";
      document.getElementById("bfpCategory").textContent = category;
      document.getElementById("adviceText").innerHTML = `📢 <b>Plain English Summary:</b> Your body composition fat percentage is estimated around <b>${finalBFP}%</b> based on U.S. Navy metrics.<br><br>💡 <b>Actionable Tip:</b> Combine steady protein-rich meal tracks with progressive lifting blocks to maintain metabolic agility and lean balance smoothly.`;
      
      document.getElementById("inputInterface").style.display = "none";
      document.getElementById("resultInterface").style.display = "block";
    }

    function resetCalc() {
      document.getElementById("inputInterface").style.display = "block";
      document.getElementById("resultInterface").style.display = "none";
    }
  </script>
</body>
</html>
