<style>
:root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --success: #10b981;
    --success-bg: #ecfdf5;
    --background: #f8fafc;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --card-bg: #ffffff;
    --border-color: #e2e8f0;
    --radius-lg: 24px;
    --radius-md: 16px;
    --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
    --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
    background: var(--background); 
    color: var(--text-main); 
    line-height: 1.6; 
    padding: 24px 16px; 
}
.container { max-width: 800px; margin: auto; }

/* Structural Navigation Controls */
.calc-navigation { display: flex; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 20px; }
.back-home-btn { color: var(--text-muted); text-decoration: none; font-weight: 600; background: transparent; border: none; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; }
.back-home-btn:hover { color: var(--primary); background: #f1f5f9; }

/* Identity Branding Component Header Block */
.hero { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; padding: 48px 32px; border-radius: var(--radius-lg); margin-bottom: 28px; box-shadow: var(--shadow-xl); position: relative; overflow: hidden; }
.hero h1 { font-size: 34px; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 12px; line-height: 1.2; }
.hero p { font-size: 16px; opacity: 0.9; max-width: 620px; font-weight: 400; }

/* Container Core Layout Architecture */
.card { background: var(--card-bg); padding: 32px; border-radius: var(--radius-lg); margin-bottom: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); }
.card h3 { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 20px; letter-spacing: -0.01em; }

/* Form Component Parameters */
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 15px; font-weight: 700; color: #334155; margin-bottom: 8px; }
.input-wrapper { display: flex; align-items: center; background: #f8fafc; border: 2px solid var(--border-color); border-radius: var(--radius-md); padding: 4px 16px; transition: border-color 0.2s; }
.input-wrapper:focus-within { border-color: var(--primary); background: #ffffff; }
.input-wrapper input { width: 100%; border: none; background: transparent; padding: 12px 0; font-size: 16px; font-weight: 600; color: var(--text-main); outline: none; }
.input-wrapper .unit { font-size: 14px; font-weight: 700; color: var(--text-muted); padding-left: 12px; }

.calc-btn { width: 100%; background: var(--primary); color: white; border: none; border-radius: var(--radius-md); padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 12px; }
.calc-btn:hover { background: var(--primary-hover); }

/* Analytical Result Outputs Dashboard */
.result-area { display: none; border-top: 2px dashed var(--border-color); margin-top: 28px; padding-top: 28px; }
.result-headline { text-align: center; margin-bottom: 24px; }
.result-headline .label { font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.result-headline .output { font-size: 56px; font-weight: 800; color: var(--primary); line-height: 1.1; margin: 4px 0; }
.result-headline .status { font-size: 16px; font-weight: 700; color: #1e293b; }

/* Target Milestone Progress Elements */
.target-section { background: #f8fafc; border-radius: var(--radius-md); padding: 20px; margin-bottom: 24px; border: 1px solid var(--border-color); }
.target-header { display: flex; justify-content: space-between; font-weight: 700; font-size: 14.5px; color: #334155; margin-bottom: 8px; }
.progress-bg { height: 14px; background: #e2e8f0; border-radius: 20px; overflow: hidden; margin-bottom: 12px; }
.progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 1s ease-out; }
.progress-fill.target-achieved { background: var(--success); }
.target-message { font-size: 14px; color: var(--text-muted); font-weight: 500; }

/* Quantitative Equivalents Micro Grid */
.equivalents-title { font-size: 15px; font-weight: 700; color: #334155; margin-bottom: 12px; }
.equivalents-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.equiv-card { background: #ffffff; border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; text-align: center; box-shadow: var(--shadow-sm); }
.equiv-icon { font-size: 24px; margin-bottom: 4px; }
.equiv-val { font-size: 18px; font-weight: 800; color: #1e293b; }
.equiv-label { font-size: 12px; font-weight: 600; color: var(--text-muted); }

/* Text Interpretations Grid */
.interpretation-box { margin-top: 24px; padding: 16px 20px; border-radius: var(--radius-md); background: #f0f6ff; border-left: 4px solid var(--primary); }
.interpretation-box.success-theme { background: var(--success-bg); border-left-color: var(--success); }
.interpretation-box h4 { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: #1e293b; }
.interpretation-box p { font-size: 14.5px; color: #475569; text-align: justify; }

/* General Matrix Links Components */
.recommend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
.recommend-link { text-decoration: none; color: inherit; }
.recommend-item { padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: #f8fafc; transition: all 0.2s; height: 100%; }
.recommend-item:hover { border-color: var(--primary); background: #f0f6ff; transform: translateY(-2px); }
.recommend-item strong { display: block; font-size: 15px; color: #1e293b; margin-bottom: 4px; }
.recommend-item p { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

/* FAQ Module Layout */
.faq-title { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
.faq-item { border-bottom: 1px solid var(--border-color); padding: 16px 0; }
.faq-item:last-child { border-bottom: none; padding-bottom: 0; }
.faq-item strong { display: block; font-size: 16px; color: #1e293b; margin-bottom: 6px; }
.faq-item p { color: #475569; font-size: 14.5px; text-align: justify; }

footer { text-align: center; margin-top: 36px; color: var(--text-muted); font-size: 14px; border-top: 1px solid var(--border-color); padding-top: 20px; }

@media(max-width:768px){
    .hero { padding: 36px 20px; }
    .hero h1 { font-size: 28px; }
    .card { padding: 24px; }
    .equivalents-grid { grid-template-columns: 1fr; }
    .recommend-grid { grid-template-columns: 1fr; }
}
</style>
</head>
