<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator | ToolsQuark</title>
<style>
/* ... (保持你原有的 CSS 样式不变) ... */
</style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>BMI Calculator</h1>
        <p>Accurately calculate your Body Mass Index (BMI) based on your weight and height to understand your health status.</p>
    </div>

    <div class="calc-navigation">
        <button class="back-home-btn" onclick="window.location.href='https://toolsquark.com/'">← Home</button>
    </div>

    <div class="card">
        <div id="inputs-area"></div>
        <button class="calc-submit-btn" onclick="calculateNow()">Calculate Now</button>
        
        <div id="result-area" class="result-box" style="display:none;">
            <div class="normal-range-badge">Result</div>
            <div class="result-val" id="calc-output">0.00</div>
            <div class="result-status" id="calc-status"></div>
            <div class="result-desc" id="calc-desc"></div>
        </div>
    </div>
</div>

<script>
// 1. 注入真实的配置数据
const inputConfigs = [
    {id: "weight", label: "Weight", unit: "kg", placeholder: "70"},
    {id: "height", label: "Height", unit: "cm", placeholder: "175"}
];

// 2. 初始化输入框
const inputsArea = document.getElementById('inputs-area');
inputConfigs.forEach(cfg => {
    inputsArea.innerHTML += `
    <div class="input-group">
        <label>${cfg.label} (${cfg.unit})</label>
        <input type="number" id="input_${cfg.id}" placeholder="e.g. ${cfg.placeholder}">
    </div>`;
});

// 3. 修复后的计算逻辑
function calculateNow() {
    const w = parseFloat(document.getElementById('input_weight').value);
    const h = parseFloat(document.getElementById('input_height').value);
    
    if (isNaN(w) || isNaN(h) || h <= 0) {
        alert("Please enter valid weight and height.");
        return;
    }
    
    // BMI公式: 体重(kg) / (身高(m)的平方)
    const bmi = w / Math.pow(h / 100, 2);
    
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('calc-output').innerText = bmi.toFixed(1);
    
    let status = "";
    if (bmi < 18.5) status = "Underweight";
    else if (bmi < 24.9) status = "Normal weight";
    else if (bmi < 29.9) status = "Overweight";
    else status = "Obese";
    
    document.getElementById('calc-status').innerText = status;
}
</script>
</body>
</html>
