<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Quality Assessment | ToolsQuark</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#f5f7fb;color:#222;line-height:1.6;padding:20px;}
.container{max-width:800px;margin:auto;}
.hero{background:linear-gradient(135deg,#2563eb,#4f46e5);color:white;padding:40px 30px;border-radius:25px;margin-bottom:25px;box-shadow:0 10px 30px rgba(0,0,0,.15);}
.hero h1{font-size:36px;margin-bottom:15px;}
.hero p{font-size:17px;opacity:.95;}
.card{background:white;padding:25px;border-radius:20px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.08);}
.progress-wrap{width:100%;height:18px;background:#e5e7eb;border-radius:20px;overflow:hidden;position:relative;flex-grow:1;}
.quiz-header{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:25px;}
.back-home-btn{font-size:15px;color:#64748b;text-decoration:none;display:inline-flex;align-items:center;white-space:nowrap;flex-shrink:0;cursor:pointer;font-weight:500;background:transparent;border:none;padding:0;width:auto;margin-right:20px;}
.back-home-btn:hover{color:#2563eb;}
.progress{height:100%;width:10%;background:#2563eb;transition:.3s;display:flex;align-items:center;justify-content:flex-end;position:relative;}
.progress-text{position:absolute;right:10px;color:white;font-size:11px;font-weight:bold;white-space:nowrap;}
.question{font-size:24px;font-weight:bold;margin-bottom:20px;}
.option{padding:16px;border:2px solid #e5e7eb;border-radius:15px;margin-bottom:12px;cursor:pointer;transition:.2s;}
.option:hover{border-color:#2563eb;background:#eff6ff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,0.08);}
.selected{border-color:#2563eb;background:#dbeafe;}
.selected-heavy{border-color:#f97316;background:#fff7ed;}
.hidden{display:none;}
.score{font-size:70px;font-weight:bold;text-align:center;color:#2563eb;}
.profile{text-align:center;font-size:30px;font-weight:bold;margin-top:10px;margin-bottom:15px;}
.description{text-align:center;color:#555;margin-bottom:25px;}
footer{text-align:center;margin-top:30px;color:#777;}
</style>
</head>
<body>
<div class="container">
<div class="hero">
    <h1>Sleep Quality Assessment</h1>
    <p>Analyze your structural sleep deepness and late-night recovery routines.</p>
</div>
<div class="card" id="quiz">
    <div class="quiz-header">
        <button class="back-home-btn" onclick="handleBackHome()">← Home</button>
        <div class="progress-wrap">
            <div class="progress" id="progress"><span class="progress-text" id="progress-percent">10%</span></div>
        </div>
    </div>
    <div class="question" id="question"></div>
    <div id="answers"></div>
</div>
<div class="card hidden" id="result">
    <div class="score" id="score"></div>
    <div class="profile" id="profile"></div>
    <div class="description" id="description"></div>
</div>
<footer>© 2026 ToolsQuark</footer>
</div>
<script>
const questions = [{"question":"How long does it typically take you to fall asleep at night?","options":["Under 15 minutes","15 to 30 minutes","30 to 60 minutes","More than an hour"]},{"question":"Do you feel completely refreshed when waking up?","options":["Always","Mostly","Rarely","Never"]}];
let current=0, totalScore=0, selected=null, isTransitioning=false;
function loadQuestion(){
    const q=questions[current];
    document.getElementById("question").innerText=q.question;
    const currentPercentage = Math.round(((current + 1) / questions.length) * 100);
    document.getElementById("progress").style.width=currentPercentage+"%";
    document.getElementById("progress-percent").innerText=currentPercentage+"%";
    let html="";
    q.options.forEach((option,index)=>{
        html+=`<div class="option" onclick="selectOption(this,${index+1},${index})">${option}</div>`;
    });
    document.getElementById("answers").innerHTML=html;
    isTransitioning = false;
}
function selectOption(el,score,optionIndex){
    if(isTransitioning) return;
    document.querySelectorAll(".option").forEach(item=>{item.classList.remove("selected","selected-heavy");});
    if(optionIndex >= 2) el.classList.add("selected-heavy"); else el.classList.add("selected");
    isTransitioning = true;
    totalScore+=score;
    setTimeout(() => {
        current++;
        if(current<questions.length) loadQuestion(); else showResult();
    }, 300);
}
function showResult(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
    document.getElementById("score").innerText=totalScore + "/" + (questions.length * 4);
    
    // 简单的通用分数判定逻辑
    let profile = "Assessment Complete", desc = "Thank you for completing the test. Your profile has been analyzed.";
    if(totalScore <= (questions.length * 1.6)) {
        profile = "Balanced Profile"; desc = "You demonstrate stable and balanced indicators in this specific scope.";
    } else if(totalScore <= (questions.length * 2.8)) {
        profile = "Moderate Accumulator"; desc = "Noticeable patterns detected. Light adjustments or regular recovery suggested.";
    } else {
        profile = "Elevated Alert Profile"; desc = "High levels observed. Professional insight or systematic relaxation is recommended.";
    }
    document.getElementById("profile").innerText=profile;
    document.getElementById("description").innerText=desc;
}
function handleBackHome(){ if(confirm("Are you sure you want to leave?")) window.location.href="https://www.toolsquark.com/"; }
loadQuestion();
</script>
</body>
</html>
