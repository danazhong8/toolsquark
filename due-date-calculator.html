<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Due Date Calculator - ToolsQuark</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
    .calc-container { max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
    .calc-header { background: linear-gradient(135deg, #3b82f6, #1d4ed8); padding: 24px; border-radius: 12px; color: #fff; margin-bottom: 24px; text-align: center; }
    .calc-header h1 { margin: 0; font-size: 24px; font-weight: 700; }
    .calc-header p { margin: 8px 0 0; font-size: 14px; opacity: 0.9; }
    .btn-submit { display: block; width: 100%; background: #3b82f6; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
    .btn-submit:hover { background: #2563eb; }
    .result-box { display: none; margin-top: 24px; padding: 24px; border: 2px dashed #3b82f6; border-radius: 12px; background: #eff6ff; text-align: center; }
    .result-value { font-size: 42px; font-weight: 800; color: #3b82f6; margin: 12px 0; }
    .result-title { font-size: 18px; font-weight: 700; color: #1e3a8a; }
    .result-desc { font-size: 14px; color: #4b5563; line-height: 1.6; margin-top: 8px; text-align: left; }
    .faq-section { margin-top: 32px; border-top: 1px solid #e5e7eb; padding-top: 24px; }
    .faq-title { font-size: 16px; font-weight: 700; color: #1f2937; margin-bottom: 16px; }
    .faq-item { margin-bottom: 16px; }
    .faq-item strong { display: block; font-size: 14px; color: #374151; margin-bottom: 4px; }
    .faq-item p { margin: 0; font-size: 13px; color: #6b7280; line-height: 1.5; }
    .nav-back { display: inline-block; margin-bottom: 16px; color: #6b7280; text-decoration: none; font-size: 14px; }
    .nav-back:hover { color: #3b82f6; }
  </style>
</head>
<body>

  <div class="calc-container">
    <a href="/" class="nav-back">&larr; Home</a>
    
    <div class="calc-header">
      <h1>Due Date Calculator</h1>
      <p>Estimate your standard clinical estimated due date (EDD) based on your last menstrual period timeline.</p>
    </div>

    <div id="inputsForm">
      undefined
    </div>

    <button class="btn-submit" onclick="performCalculation()">Calculate Now</button>

    <div id="resultBox" class="result-box">
      <div class="result-title">Calculation Success</div>
      <div id="resultVal" class="result-value">--</div>
      <div class="result-desc">
        <strong>Professional Interpretation:</strong><br>
        {{RESULT_DESC}}
      </div>
    </div>

    <div class="faq-section">
      <div class="faq-title">Frequently Asked Questions</div>
      
    </div>
  </div>

  <script>
    function performCalculation() {
      try {
        // 💡 终极安全动态函数：直接执行纯字符串计算公式，避开一切环境转义机制
        const result = eval(`undefined`);
        
        if (isNaN(result) || result === null || result === undefined) {
          alert("Please fill in all input boxes with valid numbers.");
          return;
        }
        
        // 完美的数值平滑美化展示
        document.getElementById("resultVal").innerText = Number(result).toLocaleString(undefined, { maximumFractionDigits: 2 });
        document.getElementById("resultBox").style.display = "block";
        document.getElementById("resultBox").scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        alert("Please ensure all fields are filled properly.");
        console.error(err);
      }
    }
  </script>

</body>
</html>
