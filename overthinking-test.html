<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Overthinking Test - Cognitive Rumination & Analysis Paralysis Scale</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 750px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { text-decoration: none; color: #4b5563; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.5); transition: background 0.2s; min-height: 48px; }
    .back-btn:hover { background: #fff; }
    h1 { font-size: 24px; font-weight: bold; color: #111827; }
    .progress-container { width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: #10b981; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .question-card { animation: fadeIn 0.3s ease-out; }
    .question-title { font-size: 18px; font-weight: 600; color: #111827; margin-bottom: 20px; line-height: 1.5; }
    .options-wrapper { display: flex; flex-direction: column; gap: 12px; }
    .option-item { padding: 16px; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; cursor: pointer; font-size: 15px; color: #374151; transition: all 0.2s; display: flex; align-items: center; min-height: 52px; }
    .option-item:hover { border-color: #10b981; background: rgba(16,185,129,0.03); transform: translateX(2px); }
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; border-top: 1px solid #e5e7eb; padding-top: 15px; }
    .btn-nav { padding: 8px 16px; background: rgba(0,0,0,0.05); border: none; border-radius: 8px; font-size: 14px; cursor: pointer; color: #4b5563; min-height: 40px; }
    .btn-nav:hover:not(:disabled) { background: rgba(0,0,0,0.1); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
    .result-card { display: none; text-align: center; animation: fadeIn 0.4s ease-out; }
    .score-badge { font-size: 56px; font-weight: 800; color: #10b981; margin: 15px 0; }
    .analysis-title { font-size: 22px; font-weight: bold; color: #1f2937; margin-bottom: 15px; }
    .analysis-text { color: #4b5563; font-size: 15px; line-height: 1.6; text-align: left; background: #fff; padding: 25px; border-radius: 16px; border: 1px solid #e5e7eb; }
    .btn-reset { margin-top: 25px; padding: 12px 24px; background: #6b7280; color: #fff; border: none; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; min-height: 45px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <main class="container">
    <div class="header-block">
      <a href="index.html" class="back-btn">← Back to Hub</a>
      <h1>Overthinking Test</h1>
    </div>
    <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>

    <div id="quizInterface">
      <div class="question-card">
        <div id="questionText" class="question-title">Analyzing rumination models...</div>
        <div id="optionsWrapper" class="options-wrapper"></div>
      </div>
      <div class="nav-buttons">
        <button id="btnBack" class="btn-nav" onclick="prevQuestion()" disabled>← Previous Question</button>
        <span id="questionCount" style="font-size:13px; color:#9ca3af; align-self:center;">Step 1 of 10</span>
      </div>
    </div>

    <div id="resultInterface" class="result-card">
      <p style="font-size:14px; text-transform:uppercase; letter-spacing:1.5px; color:#6b7280; font-weight:600;">Rumination Density Score</p>
      <div id="finalScore" class="score-badge">0 / 30</div>
      <div id="analysisTitle" class="analysis-title">Deconstructing thoughts...</div>
      <div id="analysisText" class="analysis-text"></div>
      <button class="btn-reset" onclick="resetTest()">Retake Assessment</button>
    </div>
  </main>

  <script>
    const questions = [
      "After an awkward or routine social interaction, how long do you spend dissecting what you said or did?",
      "When faced with a relatively simple decision (e.g., picking a restaurant or item), what is your process?",
      "How frequently do you construct worst-case catastrophic scenarios in your head for upcoming events?",
      "When a close friend or colleague sends a slightly brief text message, what does your brain conclude?",
      "How often does your brain replay historical mistakes or embarrassing memories from years ago when you try to sleep?",
      "How much does your continuous stream of internal dialogue interfere with enjoying real-time physical experiences?",
      "How frequently do you seek excessive validation from multiple people before finalizing an individual choice?",
      "When something actually goes completely right, do you immediately look for hidden traps or tell yourself it won't last?",
      "How easily can you intentionally silence or redirect your thoughts when you realize you are looping?",
      "How frequently do minor, unchangeable past details keep you awake with deep, agonizing 'What if' patterns?"
    ];

    const interpretations = [
      { bound: 8, title: "Zen Present-Moment Integration Master (Mindful Baseline)", text: "<strong>1. Current Profile:</strong> Your cognitive clearance rate is exceptional. You process events efficiently without leaving a heavy psychological debt loop behind.<br><br><strong>2. Core Psychological Root:</strong> You practice automated radical acceptance of past variables, viewing simple decisions as transient matters rather than high-stakes parameters.<br><br><strong>3. Actionable Hack:</strong> Keep relying on your intuition. When complex multi-layered dilemmas occur, trust your fast analytical instinct to maintain this mental clarity." },
      { bound: 19, title: "Elevated Retrospective Loop Tendencies (Moderate Rumination)", text: "<strong>1. Current Profile:</strong> You have a healthy mind that occasionally gets trapped in heavy analysis paralysis. Mild bottlenecks can trigger loop sequences that waste mental energy.<br><br><strong>2. Core Psychological Root:</strong> An Underlying perfectionist tendency makes you feel that collecting more data or second-guessing choices will protect you from minor mistakes.<br><br><strong>3. Actionable Hack:</strong> Practice strict time-boxing for low-stakes decisions. Give yourself exactly 2 minutes to select meals or outfits, and pledge to move forward with zero looking back." },
      { bound: 30, title: "Hyper-Analytic Rumination Lockout (Severe Overthinking)", text: "<strong>1. Current Profile:</strong> Your brain is locked in continuous, high-friction over-processing. This mental loop can trigger physical exhaustion and disrupt your sleep.<br><br><strong>2. Core Psychological Root:</strong> High hyper-vigilance causes your mind to mistake routine social inputs or brief texts as active threats, replaying past details on repeat.<br><br><strong>3. Actionable Hack:</strong> Use the 5-4-3-2-1 grounding technique whenever loops spin out of control. Force yourself to name 5 things you can see, 4 things you can touch, 3 things you can hear, 2 things you can smell, and 1 thing you can taste to snap back to reality." }
    ];

    const optionsText = [
      "3 - Constantly / Severe Analysis Paralysis",
      "2 - Frequently / Notable Loop Cycles",
      "1 - Occasionally / passing thoughts",
      "0 - Never / Dismissed Instantly"
    ];
    
    let currentIndex = 0;
    let answerHistory = [];

    function renderQuestion() {
      document.getElementById("progressBar").style.width = (currentIndex / questions.length) * 100 + "%";
      document.getElementById("questionCount").textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      document.getElementById("questionText").textContent = `${currentIndex + 1}. ${questions[currentIndex]}`;
      
      document.getElementById("btnBack").disabled = currentIndex === 0;
      const wrapper = document.getElementById("optionsWrapper");
      wrapper.innerHTML = "";
      
      optionsText.forEach((opt, idx) => {
        const div = document.createElement("div");
        div.className = "option-item";
        div.textContent = opt;
        let scoreWeight = 3 - idx;
        div.onclick = () => selectOption(scoreWeight);
        wrapper.appendChild(div);
      });
    }

    function selectOption(weight) {
      answerHistory[currentIndex] = weight;
      currentIndex++;
      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function showResult() {
      let totalScore = answerHistory.reduce((a, b) => a + b, 0);
      document.getElementById("quizInterface").style.display = "none";
      document.getElementById("resultInterface").style.display = "block";
      document.getElementById("progressBar").style.width = "100%";
      
      document.getElementById("finalScore").textContent = totalScore + " / 30";
      let matched = interpretations.find(i => totalScore <= i.bound) || interpretations[interpretations.length - 1];
      document.getElementById("analysisTitle").textContent = matched.title;
      document.getElementById("analysisText").innerHTML = matched.text;
    }

    function resetTest() {
      currentIndex = 0;
      answerHistory = [];
      document.getElementById("resultInterface").style.display = "none";
      document.getElementById("quizInterface").style.display = "block";
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
