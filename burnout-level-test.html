<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burnout Level Test - ToolsQuark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 750px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { background: #4b5563; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
    .back-btn:hover { background: #1f2937; }
    .progress-container { width: 100%; background: #e5e7eb; height: 6px; border-radius: 3px; margin-bottom: 35px; overflow: hidden; }
    .progress-bar { height: 100%; background: #2563eb; width: 0%; transition: width 0.3s ease; }
    .question-box h3 { font-size: 22px; margin-bottom: 25px; line-height: 1.4; color: #111827; }
    .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
    .option-item { background: white; border: 1px solid #e5e7eb; padding: 18px 24px; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 16px; font-weight: 500; }
    .option-item:hover { border-color: #2563eb; background: #f0f5ff; transform: translateX(4px); }
    .result-box { display: none; text-align: center; }
    
    .metric-circle { width: 140px; height: 140px; border-radius: 50%; background: #2563eb; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 25px; box-shadow: 0 10px 20px rgba(37,99,235,0.2); }
    .metric-value { font-size: 30px; font-weight: bold; }
    .metric-label { font-size: 11px; opacity: 0.9; letter-spacing: 1px; margin-top: 2px; }
    
    .result-title { font-size: 24px; font-weight: bold; margin-bottom: 18px; color: #111827; }
    .result-interpretation { font-size: 15px; color: #4b5563; line-height: 1.6; text-align: left; background: #f8fafc; padding: 24px; border-radius: 16px; border-left: 4px solid #2563eb; margin-bottom: 30px; }
    
    .user-friendly-translation { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e1; color: #1e293b; font-weight: 500; }
    .actionable-tips { margin-top: 15px; background: #f0fdf4; border-left: 4px solid #16a34a; padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 14px; color: #14532d; text-align: left; }
    .actionable-tips div { margin-bottom: 6px; }

    .action-buttons { display: flex; justify-content: center; gap: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-block"><h2>Burnout Level Test</h2><a href="index.html" class="back-btn">← Back</a></div>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div id="quizInterface"><div class="question-box"><h3 id="questionText">Loading...</h3><div class="options-list" id="optionsWrapper"></div></div></div>
    
    <div class="result-box" id="resultInterface">
      <div class="metric-circle">
        <div class="metric-value" id="finalScore">0 pts</div>
        <div class="metric-label">TOTAL SCORE</div>
      </div>
      <h3 class="result-title" id="analysisTitle"></h3>
      
      <div class="result-interpretation">
        <div id="analysisText"></div>
        <div class="user-friendly-translation" id="plainTextTranslation"></div>
        <div class="actionable-tips" id="actionableTipsBox"></div>
      </div>
      
      <div class="action-buttons">
        <button onclick="restartQuiz()" class="back-btn" style="background:#4b5563; padding:12px 24px; font-size:15px; font-weight:bold;">Retake Test</button>
        <a href="index.html" class="back-btn" style="background:#2563eb; padding:12px 28px; font-size:15px; font-weight:bold;">Back to Home Base</a>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      "Feel physically depleted and exhausted at the end of a typical operational day?",
      "Find yourself becoming increasingly cynical or detached regarding task values or team dynamics?",
      "Experience a sense of low personal accomplishment and feel your daily output has minimal macro impact?",
      "Have trouble initiating basic work workflows in the morning due to an underlying sense of dread?",
      "Notice a decreased tolerance threshold when dealing with minor operational hitches or coworker queries?",
      "Suffer from chronic physical symptoms like stress headaches or muscle tension tied to work environments?",
      "Find it hard to maintain cognitive focus on single objectives, feeling completely scattered?",
      "Feel that your personal life boundaries have been completely overtaken by vocational worry loops?",
      "Resort to quick-fix coping habits (like mindless scrolling or emotional eating) to dull work stress?",
      "Feel unappreciated or systematically trapped within your current workflow distribution matrices?"
    ];

    const interpretations = [
      {
        min: 25, max: 30,
        title: "Critical System Exhaustion (Severe Burnout)",
        text: "Your core parameters signal complete depletion. Immediate offloading, systematic lifestyle adjustments, medical leaves, or structural role changes are essential.",
        plainText: "📢 Plain English Summary: You are running on empty. Chronic stress has deeply affected both your physical energy and mental connection to work.",
        tips: "<div>💡 <b>Tip 1:</b> Speak with leadership or HR immediately to discuss shifting your current workload bounds.</div><div>💡 <b>Tip 2:</b> Book real, unplugged time off to let your nervous system step down from high-alert mode.</div>"
      },
      {
        min: 17, max: 24,
        title: "Active Chronic Erosion Track (Moderate Burnout)",
        text: "High boundary degradation. Chronic stress is morphing into systemic professional cynicism. Immediate offloading required.",
        plainText: "📢 Plain English Summary: You are on the edge of breaking down. Work feels increasingly frustrating, and standard weekend rests are no longer enough.",
        tips: "<div>💡 <b>Tip 1:</b> Set a firm cut-off time for checking work notifications every single evening.</div><div>💡 <b>Tip 2:</b> Delegate or say no to extra tasks that fall outside your core required duties.</div>"
      },
      {
        min: 10, max: 16,
        title: "Standard Positional Stress Loading (Mild Burnout)",
        text: "Balanced acute workload fatigue. Standard recuperative weekend breaks and boundary setting will keep you safe.",
        plainText: "📢 Plain English Summary: You are feeling normal everyday work fatigue. You still care about your role, but you need to rest intentionally.",
        tips: "<div>💡 <b>Tip 1:</b> Make sure you completely disconnect from work chatter during your regular weekends.</div><div>💡 <b>Tip 2:</b> Add a short, non-work hobby or light walk to your evening to reset your mental space.</div>"
      },
      {
        min: 0, max: 9,
        title: "Resilient Ecological Alignment Master (Excellent Baseline)",
        text: "High work-life harmony, exceptional neurological buffering, and deep protective professional fulfillment.",
        plainText: "📢 Plain English Summary: You are in an excellent place! Your work matches your current capacity well, and you hold strong boundaries.",
        tips: "<div>💡 <b>Tip 1:</b> Protect this balance by keeping your current boundaries solid as new demands arrive.</div><div>💡 <b>Tip 2:</b> Mentally log what makes this structure work so well for your future reference.</div>"
      }
    ];

    const options = ["0 - Never", "1 - Sometimes", "2 - Often", "3 - Continuously"];
    let idx = 0, score = 0;

    function render() {
      document.getElementById("progressBar").style.width = (idx / questions.length) * 100 + "%";
      document.getElementById("questionText").textContent = `${idx + 1}. ${questions[idx]}`;
      const wrapper = document.getElementById("optionsWrapper"); wrapper.innerHTML = "";
      options.forEach((opt, w) => {
        const d = document.createElement("div"); d.className = "option-item"; d.textContent = opt;
        d.onclick = () => { score += w; idx++; if(idx < questions.length) { render(); } else { showResult(); } };
        wrapper.appendChild(d);
      });
    }

    function showResult() {
      document.getElementById("quizInterface").style.display = "none";
      document.getElementById("resultInterface").style.display = "block";
      document.getElementById("progressBar").style.width = "100%";
      document.getElementById("finalScore").textContent = `${score} / 30`;
      
      let target = interpretations.find(i => score >= i.min && score <= i.max) || interpretations[ interpretations.length - 1 ];
      document.getElementById("analysisTitle").textContent = target.title;
      document.getElementById("analysisText").textContent = target.text;
      document.getElementById("plainTextTranslation").textContent = target.plainText;
      document.getElementById("actionableTipsBox").innerHTML = target.tips;
    }

    function restartQuiz() {
      idx = 0; score = 0;
      document.getElementById("quizInterface").style.display = "block";
      document.getElementById("resultInterface").style.display = "none";
      document.getElementById("progressBar").style.width = "0%";
      render();
    }
    render();
  </script>
</body>
</html>
