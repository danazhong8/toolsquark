<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Social Media Addiction Index Test - ToolsQuark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 750px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { text-decoration: none; color: #4b5563; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.5); transition: background 0.2s; min-height: 48px; }
    .back-btn:hover { background: #fff; }
    h1 { font-size: 24px; font-weight: bold; color: #111827; }
    .progress-container { width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: #3b82f6; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .question-card { animation: fadeIn 0.3s ease-out; }
    .question-title { font-size: 18px; font-weight: 600; color: #111827; margin-bottom: 20px; line-height: 1.5; }
    .options-wrapper { display: flex; flex-direction: column; gap: 12px; }
    .option-item { padding: 16px; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; cursor: pointer; font-size: 15px; color: #374151; transition: all 0.2s; min-height: 52px; display: flex; align-items: center; }
    .option-item:hover { border-color: #3b82f6; background: rgba(59,130,246,0.03); transform: translateX(2px); }
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; border-top: 1px solid #e5e7eb; padding-top: 15px; }
    .btn-nav { padding: 8px 16px; background: rgba(0,0,0,0.05); border: none; border-radius: 8px; font-size: 14px; cursor: pointer; color: #4b5563; min-height: 40px; }
    .btn-nav:hover:not(:disabled) { background: rgba(0,0,0,0.1); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
    .result-card { display: none; text-align: center; animation: fadeIn 0.4s ease-out; }
    .score-badge { font-size: 56px; font-weight: 800; color: #3b82f6; margin: 15px 0; }
    .analysis-title { font-size: 22px; font-weight: bold; color: #1f2937; margin-bottom: 15px; }
    .analysis-text { color: #4b5563; font-size: 15px; line-height: 1.6; text-align: left; background: #fff; padding: 25px; border-radius: 16px; border: 1px solid #e5e7eb; }
    .btn-reset { margin-top: 25px; padding: 12px 24px; background: #6b7280; color: #fff; border: none; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; min-height: 45px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <main class="container">
    <div class="header-block">
      <a href="index.html" class="back-btn">← Back to Hub</a>
      <h1>Dopamine Loop Index</h1>
    </div>
    <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>

    <div id="quizInterface">
      <div class="question-card">
        <div id="questionText" class="question-title">Initiating psychological assessment layer...</div>
        <div id="optionsWrapper" class="options-wrapper"></div>
      </div>
      <div class="nav-buttons">
        <button id="btnBack" class="btn-nav" onclick="prevQuestion()" disabled>← Back</button>
        <span id="questionCount" style="font-size:13px; color:#9ca3af; align-self:center;">Step 1 of 10</span>
      </div>
    </div>

    <div id="resultInterface" class="result-card">
      <p style="font-size:14px; text-transform:uppercase; letter-spacing:1.5px; color:#6b7280; font-weight:600;">Algorithmic Addiction Index</p>
      <div id="finalScore" class="score-badge">0</div>
      <div id="analysisTitle" class="analysis-title">Deconstructing Attention Metrics...</div>
      <div id="analysisText" class="analysis-text"></div>
      <button class="btn-reset" onclick="resetTest()">Re-Test Scale</button>
    </div>
  </main>

  <script>
    const questions = [
      "How frequently do you extend planned session durations on feed streams without conscious intent?",
      "How often do you experience a phantom notification sensation or an autonomous urge to check handles during dead space windows?",
      "How regularly do you execute background app switching to social grids while managing vital focus operations?",
      "How often do you notice a decline in deep text absorption or deep work endurance due to rapid-fire scrolling?",
      "How frequently do you utilize feed validation markers (likes, shares, views) as an emotional coping mechanism for stress?",
      "How often do real-world physical conversations feel secondary or interrupted by incoming grid updates?",
      "How regularly do you encounter sleep latency expansion because of algorithmic video loops in bed?",
      "How often do you feel immediate restlessness or digital isolation symptoms when net connection ports go down?",
      "How often do you baseline-compare your real lifestyle trajectory against curated viral highlight loops?",
      "How frequently do you attempt to establish screen-time blockades, only to override them within 48 hours?"
    ];

    const interpretations = [
      { bound: 8, title: "Autonomous Reality Anchor (High Cognitive Fortress)", text: "<strong>1. Current Profile:</strong> Your attention ecosystem exhibits an exceptional tier of self-directed agency. You treat social algorithms as narrow utility vectors rather than existential validation frameworks.<br><br><strong>2. Dopamine Vector:</strong> Your neural rewards loop remains anchored to real-world achievements and long-form information acquisition tracking.<br><br><strong>3. Actionable Hack:</strong> Maintain this exceptional advantage. Continue enforcing explicit physical separation of devices during deep work, protecting your rare capacity for sustained creative deep focus." },
      { bound: 19, title: "Conditioned Algorithmic Drift (Moderate Loop Binding)", text: "<strong>1. Current Profile:</strong> You have entered the early structural conditioning phase of modern attention engineering. While your baseline functional duties are operational, variable reward mechanics are successfully hijacking your minor downtime slots.<br><br><strong>2. Dopamine Vector:</strong> Frequent micro-checks of mobile devices are thinning out your baseline attention span, training the mind to expect rapid updates under low-stimulus conditions.<br><br><strong>3. Actionable Hack:</strong> Implement a full grayscale screen toggle on your device. Stripping out the hyper-saturated color maps engineered by platform designers drops the visual reward impulse instantly, weakening the underlying hand-to-eye urge loops." },
      { bound: 30, title: "Algorithmic Capture Phase (Severe Attention Hijack)", text: "<strong>1. Current Profile:</strong> Urgent priority notice. The variable dopamine architecture of modern infinite scrolls has fully integrated into your emotional regulation core. Real-world tasks are experiencing intense disruption from compulsive check behaviors.<br><br><strong>2. Dopamine Vector:</strong> Your brain's neurological pathways have been conditioned to rely on digital feeds for fast, low-effort emotional shifts, leaving real-life, slow-yield milestones feeling unstimulating and difficult.<br><br><strong>3. Actionable Hack:</strong> 1. Nuclear option: Move all social utilities completely off your primary smartphone interface—restrict access entirely to desktop or browser environments. 2. Establish a physical morning delay—no app exposure for the first 30 minutes after waking to safeguard your baseline attention focus." }
    ];

    const optionsText = ["0 - Zero Friction / Never", "1 - Mild Drift / Sometimes", "2 - Strong Impulse / Often", "3 - Continuous Compulsion / Always"];
    
    let currentIndex = 0;
    let answerHistory = [];

    function renderQuestion() {
      document.getElementById("progressBar").style.width = (currentIndex / questions.length) * 100 + "%";
      document.getElementById("questionCount").textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      document.getElementById("questionText").textContent = `${currentIndex + 1}. ${questions[currentIndex]}`;
      
      document.getElementById("btnBack").disabled = currentIndex === 0;
      
      const wrapper = document.getElementById("optionsWrapper");
      wrapper.innerHTML = "";
      
      optionsText.forEach((opt, weight) => {
        const div = document.createElement("div");
        div.className = "option-item";
        div.textContent = opt;
        div.onclick = () => selectOption(weight);
        wrapper.appendChild(div);
      });
    }

    function selectOption(weight) {
      answerHistory[currentIndex] = weight;
      currentIndex++;
      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function showResult() {
      let totalScore = answerHistory.reduce((a, b) => a + b, 0);
      document.getElementById("quizInterface").style.display = "none";
      document.getElementById("resultInterface").style.display = "block";
      document.getElementById("progressBar").style.width = "100%";
      
      document.getElementById("finalScore").textContent = totalScore + " / 30";
      let matched = interpretations.find(i => totalScore <= i.bound) || interpretations[interpretations.length - 1];
      document.getElementById("analysisTitle").textContent = matched.title;
      document.getElementById("analysisText").innerHTML = matched.text;
    }

    function resetTest() {
      currentIndex = 0;
      answerHistory = [];
      document.getElementById("resultInterface").style.display = "none";
      document.getElementById("quizInterface").style.display = "block";
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
