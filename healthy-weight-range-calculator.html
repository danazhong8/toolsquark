<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Healthy Weight Range Calculator - ToolsQuark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 550px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { background: #4b5563; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
    .back-btn:hover { background: #1f2937; }
    
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #4b5563; }
    .input-group input { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 16px; outline: none; }
    
    .calc-btn { width: 100%; background: #2563eb; color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .calc-btn:hover { background: #1d4ed8; }
    
    .result-box { display: none; text-align: center; }
    .metric-display { background: #2563eb; color: white; padding: 22px; border-radius: 16px; font-size: 28px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(37,99,235,0.15); }
    .result-interpretation { font-size: 14px; color: #4b5563; line-height: 1.6; text-align: left; background: #f8fafc; padding: 20px; border-radius: 16px; border-left: 4px solid #2563eb; margin-bottom: 25px; }
    .action-buttons { display: flex; justify-content: center; gap: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="inputInterface">
      <div class="header-block"><h2>Healthy Weight Range</h2><a href="index.html" class="back-btn">← Back</a></div>
      <div class="input-group">
        <label>Enter Your Height (cm)</label>
        <input type="number" id="height" placeholder="e.g. 170" min="100" max="240">
      </div>
      <button class="calc-btn" onclick="calculateWeightRange()">Find Weight Window</button>
    </div>

    <div class="result-box" id="resultInterface">
      <div class="metric-display" id="finalScore">54 - 72 kg</div>
      <h3 style="font-size:20px; margin-bottom:12px;" id="analysisTitle">Ideal Weight Envelope</h3>
      <div class="result-interpretation" id="analysisText"></div>
      <div class="action-buttons">
        <button onclick="resetCalc()" class="back-btn" style="background:#4b5563; padding:12px 24px; font-size:15px; font-weight:bold;">Change Stature</button>
        <a href="index.html" class="back-btn" style="background:#2563eb; padding:12px 28px; font-size:15px; font-weight:bold;">Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    function calculateWeightRange() {
      let heightCm = parseFloat(document.getElementById('height').value) || 170;
      if (heightCm <= 0) { alert("Please provide a valid height."); return; }
      
      let heightMeters = heightCm / 100;
      let minWeight = Math.round(18.5 * (heightMeters * heightMeters));
      let maxWeight = Math.round(24.9 * (heightMeters * heightMeters));
      
      document.getElementById('finalScore').textContent = `${minWeight} - ${maxWeight} kg`;
      document.getElementById('analysisText').innerHTML = `📢 <b>Plain English Summary:</b> For an adult at <b>${heightCm} cm</b> tall, medical safety standards show your healthiest clinical body composition envelope stays between <b>${minWeight} kg</b> and <b>${maxWeight} kg</b>.<br><br>💡 <b>Actionable Habit Tip:</b> Staying inside this range significantly lowers long-term blood pressure variables and metabolic fatigue indicators. Try tracking body metrics bi-weekly to maintain balance smoothly.`;
      
      document.getElementById('inputInterface').style.display = 'none';
      document.getElementById('resultInterface').style.display = 'block';
    }

    function resetCalc() {
      document.getElementById('inputInterface').style.display = 'block';
      document.getElementById('resultInterface').style.display = 'none';
    }
  </script>
</body>
</html>
