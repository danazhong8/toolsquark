<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator - ToolsQuark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 550px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { background: #4b5563; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
    .back-btn:hover { background: #1f2937; }
    
    .input-group { margin-bottom: 22px; text-align: left; }
    .input-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #4b5563; }
    .input-group input { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 16px; outline: none; }
    
    .calc-btn { width: 100%; background: #2563eb; color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .calc-btn:hover { background: #1d4ed8; }
    
    .result-box { display: none; text-align: center; }
    .age-pill { background: #2563eb; color: white; padding: 20px; border-radius: 16px; font-size: 26px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(37,99,235,0.1); }
    .result-interpretation { font-size: 14px; color: #4b5563; line-height: 1.6; text-align: left; background: #f8fafc; padding: 20px; border-radius: 16px; border-left: 4px solid #2563eb; }
    .action-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="inputInterface">
      <div class="header-block"><h2>Chronological Age</h2><a href="index.html" class="back-btn">← Back</a></div>
      <div class="input-group">
        <label>Select Date of Birth</label>
        <input type="date" id="birthdate">
      </div>
      <button class="calc-btn" onclick="calculateAge()">Parse Chrono Parameters</button>
    </div>

    <div class="result-box" id="resultInterface">
      <div class="age-pill" id="ageDisplay">-</div>
      <div class="result-interpretation">
        <p>📢 <b>Plain English Summary:</b> Your precise chronological age parameters have been parsed successfully down to years, months, and active days alignment metrics.</p>
      </div>
      <div class="action-buttons">
        <button onclick="resetCalc()" class="back-btn" style="background:#4b5563; padding:12px 24px; font-size:15px; font-weight:bold;">Recalculate</button>
        <a href="index.html" class="back-btn" style="background:#2563eb; padding:12px 28px; font-size:15px; font-weight:bold;">Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    function calculateAge() {
      const birthInput = document.getElementById("birthdate").value;
      if (!birthInput) { alert("Please select a valid date."); return; }
      
      const birthDate = new Date(birthInput); const today = new Date();
      let years = today.getFullYear() - birthDate.getFullYear();
      let months = today.getMonth() - birthDate.getMonth();
      let days = today.getDate() - birthDate.getDate();

      if (days < 0) {
        months--;
        const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += previousMonth.getDate();
      }
      if (months < 0) { years--; months += 12; }

      document.getElementById("ageDisplay").textContent = `${years} Yrs, ${months} Mos, ${days} Days`;
      document.getElementById("inputInterface").style.display = "none";
      document.getElementById("resultInterface").style.display = "block";
    }

    function resetCalc() {
      document.getElementById("inputInterface").style.display = "block";
      document.getElementById("resultInterface").style.display = "none";
    }
  </script>
</body>
</html>
