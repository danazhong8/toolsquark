<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator - ToolsQuark</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
    .calc-container { max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
    .calc-header { background: linear-gradient(135deg, #3b82f6, #1d4ed8); padding: 24px; border-radius: 12px; color: #fff; margin-bottom: 24px; text-align: center; }
    .calc-header h1 { margin: 0; font-size: 24px; font-weight: 700; }
    .calc-header p { margin: 8px 0 0; font-size: 14px; opacity: 0.9; }
    
    .range-badge { display: inline-block; background: #eff6ff; color: #1d4ed8; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 20px; }
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .input-wrapper { display: flex; align-items: center; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; overflow: hidden; }
    .input-wrapper input { flex: 1; border: none; padding: 10px 12px; font-size: 15px; outline: none; }
    .input-unit { background: #f3f4f6; color: #6b7280; padding: 10px 14px; font-size: 13px; border-left: 1px solid #e5e7eb; min-width: 45px; text-align: center; }
    
    .btn-submit { display: block; width: 100%; background: #3b82f6; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 24px; transition: background 0.2s; }
    .btn-submit:hover { background: #2563eb; }
    
    .result-box { display: none; margin-top: 24px; padding: 24px; border: 2px dashed #3b82f6; border-radius: 12px; background: #eff6ff; }
    .result-value { font-size: 42px; font-weight: 800; color: #3b82f6; margin: 12px 0; text-align: center; }
    .result-title { font-size: 18px; font-weight: 700; color: #1e3a8a; text-align: center; }
    .result-desc { font-size: 14px; color: #4b5563; line-height: 1.6; margin-top: 12px; border-top: 1px solid #dbeafe; padding-top: 12px; }
    
    .faq-section { margin-top: 32px; border-top: 1px solid #e5e7eb; padding-top: 24px; }
    .faq-title { font-size: 16px; font-weight: 700; color: #1f2937; margin-bottom: 16px; }
    .faq-item { margin-bottom: 16px; }
    .faq-item strong { display: block; font-size: 14px; color: #374151; margin-bottom: 4px; }
    .faq-item p { margin: 0; font-size: 13px; color: #6b7280; line-height: 1.5; }
    .nav-back { display: inline-block; margin-bottom: 16px; color: #6b7280; text-decoration: none; font-size: 14px; }
    .nav-back:hover { color: #3b82f6; }
  </style>
</head>
<body>

  <div class="calc-container">
    <a href="/" class="nav-back">&larr; Home</a>
    
    <div class="calc-header">
      <h1>Age Calculator</h1>
      <p>Calculate your exact chronological age in years, months, and days based on your calendar birth parameters instantly.</p>
    </div>

    <div class="range-badge">Normal Range: Lifespan Track Profile</div>

    <div id="inputsForm"></div>

    <button class="btn-submit" onclick="performCalculation()">Calculate Now</button>

    <div id="resultBox" class="result-box">
      <div class="result-title">Calculation Success</div>
      <div id="resultVal" class="result-value">--</div>
      <div class="result-desc">
        <strong>Professional Interpretation & Suggestion:</strong><br>
        {{RESULT_DESC}}
      </div>
    </div>

    <div class="faq-section">
      <div class="faq-title">Frequently Asked Questions</div>
      
    </div>
  </div>

  <script>
    // 💡 核心解法：将打包进来的纯文本字符串，在前端通过 JSON.parse 转换为真正无损的配置数组
    const inputConfigs = JSON.parse(`undefined`);
    const formContainer = document.getElementById("inputsForm");

    // 动态无损渲染表单输入域
    inputConfigs.forEach(cfg => {
      const group = document.createElement("div");
      group.className = "input-group";
      group.innerHTML = `
        <label for="${cfg.id}">${cfg.label}</label>
        <div class="input-wrapper">
          <input type="number" id="${cfg.id}" placeholder="${cfg.placeholder || ''}">
          <div class="input-unit">${cfg.unit}</div>
        </div>
      `;
      formContainer.appendChild(group);
    });

    function performCalculation() {
      try {
        // 收集表单输入数据
        const fields = {};
        let isValid = true;
        
        inputConfigs.forEach(cfg => {
          const val = parseFloat(document.getElementById(cfg.id).value);
          if (isNaN(val)) {
            isValid = false;
          }
          fields[cfg.id] = val;
        });

        if (!isValid) {
          alert("Please fill in all inputs with valid numeric values.");
          return;
        }

        // 动态执行精简单行计算公式
        const calcFormulaText = `undefined`;
        const formulaFunc = new Function('fields', 'return ' + calcFormulaText);
        const result = formulaFunc(fields);
        
        // 动态回显完美的结果看板
        document.getElementById("resultVal").innerText = Number(result).toLocaleString(undefined, { maximumFractionDigits: 1 });
        document.getElementById("resultBox").style.display = "block";
        document.getElementById("resultBox").scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        alert("An error occurred during calculation. Please check your input fields.");
        console.error(err);
      }
    }
  </script>

</body>
</html>
