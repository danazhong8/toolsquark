<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smartphone Addiction Test - Screen Time Dependency Diagnostic Scale</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 750px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { text-decoration: none; color: #4b5563; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.5); transition: background 0.2s; min-height: 48px; }
    .back-btn:hover { background: #fff; }
    h1 { font-size: 24px; font-weight: bold; color: #111827; }
    .progress-container { width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: #3b82f6; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .question-card { animation: fadeIn 0.3s ease-out; }
    .question-title { font-size: 18px; font-weight: 600; color: #111827; margin-bottom: 20px; line-height: 1.5; }
    .options-wrapper { display: flex; flex-direction: column; gap: 12px; }
    .option-item { padding: 16px; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; cursor: pointer; font-size: 15px; color: #374151; transition: all 0.2s; display: flex; align-items: center; min-height: 52px; }
    .option-item:hover { border-color: #3b82f6; background: rgba(59,130,246,0.03); transform: translateX(2px); }
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; border-top: 1px solid #e5e7eb; padding-top: 15px; }
    .btn-nav { padding: 8px 16px; background: rgba(0,0,0,0.05); border: none; border-radius: 8px; font-size: 14px; cursor: pointer; color: #4b5563; min-height: 40px; }
    .btn-nav:hover:not(:disabled) { background: rgba(0,0,0,0.1); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
    .result-card { display: none; text-align: center; animation: fadeIn 0.4s ease-out; }
    .score-badge { font-size: 56px; font-weight: 800; color: #3b82f6; margin: 15px 0; }
    .analysis-title { font-size: 22px; font-weight: bold; color: #1f2937; margin-bottom: 15px; }
    .analysis-text { color: #4b5563; font-size: 15px; line-height: 1.6; text-align: left; background: #fff; padding: 25px; border-radius: 16px; border: 1px solid #e5e7eb; }
    .btn-reset { margin-top: 25px; padding: 12px 24px; background: #6b7280; color: #fff; border: none; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; min-height: 45px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <main class="container">
    <div class="header-block">
      <a href="index.html" class="back-btn">← Back to Hub</a>
      <h1>Phone Addiction Test</h1>
    </div>
    <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>

    <div id="quizInterface">
      <div class="question-card">
        <div id="questionText" class="question-title">Loading behavioral questions...</div>
        <div id="optionsWrapper" class="options-wrapper"></div>
      </div>
      <div class="nav-buttons">
        <button id="btnBack" class="btn-nav" onclick="prevQuestion()" disabled>← Previous Question</button>
        <span id="questionCount" style="font-size:13px; color:#9ca3af; align-self:center;">Step 1 of 10</span>
      </div>
    </div>

    <div id="resultInterface" class="result-card">
      <p style="font-size:14px; text-transform:uppercase; letter-spacing:1.5px; color:#6b7280; font-weight:600;">Dependency Index Score</p>
      <div id="finalScore" class="score-badge">0 / 30</div>
      <div id="analysisTitle" class="analysis-title">Processing metrics...</div>
      <div id="analysisText" class="analysis-text"></div>
      <button class="btn-reset" onclick="resetTest()">Retake Assessment</button>
    </div>
  </main>

  <script>
    const questions = [
      "What is the very first thing you do within 5 minutes of waking up in the morning?",
      "How do you feel or react when your smartphone battery drops below 10% without a charger nearby?",
      "How often do you find yourself mindlessly browsing apps without any specific purpose or goal?",
      "Do you experience 'phantom vibration syndrome' (thinking your phone vibrated when it didn't)?",
      "How frequently do family members, partners, or friends complain about your phone usage during shared meals?",
      "Have you tried to consciously reduce your daily screen time limits but failed to maintain it?",
      "How often do you lose track of time and stay up much later than intended scrolling on your device?",
      "Do you bring your mobile device with you into the bathroom every single time you enter?",
      "How does your concentration react if a notification lights up while you are doing deep focus work?",
      "What is your typical daily average smartphone screen time check according to system logs?"
    ];

    const interpretations = [
      { bound: 8, title: "Mindful Digital Freedom Master (Low Dependency)", text: "<strong>1. Current Profile:</strong> You maintain an excellent, highly healthy relationship with your device. Tech serves as a functional tool rather than a psychological crutch.<br><br><strong>2. Dopamine Mechanics:</strong> Your focus structures are driven by natural, real-world interactions rather than continuous notifications.<br><br><strong>3. Actionable Hack:</strong> Keep practicing intentional disconnection. Protect your morning window by leaving your phone face down for the first 15 minutes of the day." },
      { bound: 19, title: "Moderate Habitual Attachment Profile (Standard User)", text: "<strong>1. Current Profile:</strong> You display notable symptoms of unconscious reliance on your screen. Devices are slowly invading your slow downtime, fracturing your focus durability.<br><br><strong>2. Dopamine Mechanics:</strong> Your brain has been conditioned to crave micro-dopamine kicks whenever a minor moment of boredom or friction strikes.<br><br><strong>3. Actionable Hack:</strong> Turn off all non-human notifications (like app shopping pings or news drops). Move your most addictive scrolling apps completely off your phone's home screen into a secondary folder." },
      { bound: 30, title: "Severe Nomophobic Device Dependency (High Alert)", text: "<strong>1. Current Profile:</strong> High dependency detected. Your phone has become an automatic reflex, heavily disrupting your sleep architecture and personal relationship quality.<br><br><strong>2. Dopamine Mechanics:</strong> Your neural pathways are heavily locked into notification tracking, causing real anxiety spikes when separated from your screen.<br><br><strong>3. Actionable Hack:</strong> Enforce a strict 'no screens at the dinner table' rule. Buy a physical alarm clock and charge your phone completely outside your bedroom to eliminate late-night scrolling loop traps." }
    ];

    const optionsText = [
      "3 - Continuous Urge / High Frequency",
      "2 - Notable Urge / Frequently",
      "1 - Fleeting Urge / Sometimes",
      "0 - No Urge / Never / Managed Easily"
    ];
    
    let currentIndex = 0;
    let answerHistory = [];

    function renderQuestion() {
      document.getElementById("progressBar").style.width = (currentIndex / questions.length) * 100 + "%";
      document.getElementById("questionCount").textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      document.getElementById("questionText").textContent = `${currentIndex + 1}. ${questions[currentIndex]}`;
      
      document.getElementById("btnBack").disabled = currentIndex === 0;
      const wrapper = document.getElementById("optionsWrapper");
      wrapper.innerHTML = "";
      
      optionsText.forEach((opt, idx) => {
        const div = document.createElement("div");
        div.className = "option-item";
        div.textContent = opt;
        // Map option selection to score weight safely
        let scoreWeight = 3 - idx; 
        div.onclick = () => selectOption(scoreWeight);
        wrapper.appendChild(div);
      });
    }

    function selectOption(weight) {
      answerHistory[currentIndex] = weight;
      currentIndex++;
      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function showResult() {
      let totalScore = answerHistory.reduce((a, b) => a + b, 0);
      document.getElementById("quizInterface").style.display = "none";
      document.getElementById("resultInterface").style.display = "block";
      document.getElementById("progressBar").style.width = "100%";
      
      document.getElementById("finalScore").textContent = totalScore + " / 30";
      let matched = interpretations.find(i => totalScore <= i.bound) || interpretations[interpretations.length - 1];
      document.getElementById("analysisTitle").textContent = matched.title;
      document.getElementById("analysisText").innerHTML = matched.text;
    }

    function resetTest() {
      currentIndex = 0;
      answerHistory = [];
      document.getElementById("resultInterface").style.display = "none";
      document.getElementById("quizInterface").style.display = "block";
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
