<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Period & Ovulation Calculator - ToolsQuark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #fdfbfb, #ebedee); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.7); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { text-decoration: none; color: #4b5563; font-size: 14px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.5); min-height: 48px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #4b5563; }
    input[type="date"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; outline: none; min-height: 48px; }
    .btn-submit { width: 100%; padding: 15px; background: #ec4899; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; min-height: 48px; }
    
    .result-box { display: none; }
    .timeline-card { background: #fff; border: 1px solid #e5e7eb; padding: 16px; border-radius: 12px; margin-bottom: 12px; text-align: left; }
    .timeline-card.period { border-left: 5px solid #ec4899; }
    .timeline-card.ovulation { border-left: 5px solid #a855f7; }
    .timeline-card.fertile { border-left: 5px solid #10b981; }
    .card-label { font-size: 12px; text-transform: uppercase; color: #6b7280; font-weight: bold; margin-bottom: 20px; margin-bottom: 4px; }
    .card-date { font-size: 18px; font-weight: 700; color: #111827; }
  </style>
</head>
<body>
  <div class="container">
    <div id="inputInterface">
      <div class="header-block"><h2>Cycle Tracker</h2><a href="index.html" class="back-btn">← Back</a></div>
      <div class="form-group">
        <label>First Day of Last Period</label>
        <input type="date" id="lastPeriodDate">
      </div>
      <div class="form-group">
        <label>Average Cycle Duration (Days)</label>
        <input type="number" id="cycleLength" value="28" min="20" max="45">
      </div>
      <button class="btn-submit" onclick="calculatePeriodCycle()">Map Cycles</button>
    </div>

    <div class="result-box" id="resultInterface">
      <div class="header-block"><h2>Predicted Horizons</h2></div>
      
      <div class="timeline-card period">
        <div class="card-label">Expected Next Period Start</div>
        <div id="nextPeriodVal" class="card-date">-</div>
      </div>
      <div class="timeline-card ovulation">
        <div class="card-label">Predicted Ovulation Day</div>
        <div id="ovulationVal" class="card-date">-</div>
      </div>
      <div class="timeline-card fertile">
        <div class="card-label">Peak Fertile Window Opening</div>
        <div id="fertileWindowVal" class="card-date">-</div>
      </div>
      
      <button onclick="resetCalc()" class="btn-submit" style="background:#6b7280; margin-top:15px;">Modify Inputs</button>
    </div>
  </div>

  <script>
    function formatDate(dateObj) {
      return dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function calculatePeriodCycle() {
      const dateInput = document.getElementById("lastPeriodDate").value;
      const cycleLength = parseInt(document.getElementById("cycleLength").value) || 28;
      if (!dateInput) { alert("Please select a baseline start date."); return; }
      
      const baseDate = new Date(dateInput);
      
      const nextPeriod = new Date(baseDate);
      nextPeriod.setDate(baseDate.getDate() + cycleLength);
      
      const ovulation = new Date(nextPeriod);
      ovulation.setDate(nextPeriod.getDate() - 14);
      
      const fertileStart = new Date(ovulation);
      fertileStart.setDate(ovulation.getDate() - 5);
      
      document.getElementById("nextPeriodVal").textContent = formatDate(nextPeriod);
      document.getElementById("ovulationVal").textContent = formatDate(ovulation);
      document.getElementById("fertileWindowVal").textContent = `${formatDate(fertileStart)} - ${formatDate(ovulation)}`;
      
      document.getElementById("inputInterface").style.display = "none";
      document.getElementById("resultInterface").style.display = "block";
    }

    function resetCalc() {
      document.getElementById("inputInterface").style.display = "block";
      document.getElementById("resultInterface").style.display = "none";
    }
  </script>
</body>
</html>
