<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loneliness Level Test - Standardized Social Isolation Scale Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa, #dfe9f3); min-height: 100vh; color: #111827; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 750px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .header-block { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .back-btn { text-decoration: none; color: #4b5563; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.5); transition: background 0.2s; min-height: 48px; }
    .back-btn:hover { background: #fff; }
    h1 { font-size: 24px; font-weight: bold; color: #111827; }
    .progress-container { width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: #8b5cf6; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .question-card { animation: fadeIn 0.3s ease-out; }
    .question-title { font-size: 18px; font-weight: 600; color: #111827; margin-bottom: 20px; line-height: 1.5; }
    .options-wrapper { display: flex; flex-direction: column; gap: 12px; }
    .option-item { padding: 16px; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; cursor: pointer; font-size: 15px; color: #374151; transition: all 0.2s; display: flex; align-items: center; min-height: 52px; }
    .option-item:hover { border-color: #8b5cf6; background: rgba(139,92,246,0.03); transform: translateX(2px); }
    .nav-buttons { display: flex; justify-space-between: space-between; display: flex; justify-content: space-between; margin-top: 25px; border-top: 1px solid #e5e7eb; padding-top: 15px; }
    .btn-nav { padding: 8px 16px; background: rgba(0,0,0,0.05); border: none; border-radius: 8px; font-size: 14px; cursor: pointer; color: #4b5563; min-height: 40px; }
    .btn-nav:hover:not(:disabled) { background: rgba(0,0,0,0.1); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
    .result-card { display: none; text-align: center; animation: fadeIn 0.4s ease-out; }
    .score-badge { font-size: 56px; font-weight: 800; color: #8b5cf6; margin: 15px 0; }
    .analysis-title { font-size: 22px; font-weight: bold; color: #1f2937; margin-bottom: 15px; }
    .analysis-text { color: #4b5563; font-size: 15px; line-height: 1.6; text-align: left; background: #fff; padding: 25px; border-radius: 16px; border: 1px solid #e5e7eb; }
    .btn-reset { margin-top: 25px; padding: 12px 24px; background: #6b7280; color: #fff; border: none; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; min-height: 45px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <main class="container">
    <div class="header-block">
      <a href="index.html" class="back-btn">← Back to Hub</a>
      <h1>Loneliness Level Test</h1>
    </div>
    <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>

    <div id="quizInterface">
      <div class="question-card">
        <div id="questionText" class="question-title">Loading questions...</div>
        <div id="optionsWrapper" class="options-wrapper"></div>
      </div>
      <div class="nav-buttons">
        <button id="btnBack" class="btn-nav" onclick="prevQuestion()" disabled>← Previous Question</button>
        <span id="questionCount" style="font-size:13px; color:#9ca3af; align-self:center;">Step 1 of 10</span>
      </div>
    </div>

    <div id="resultInterface" class="result-card">
      <p style="font-size:14px; text-transform:uppercase; letter-spacing:1.5px; color:#6b7280; font-weight:600;">Relational Isolation Index</p>
      <div id="finalScore" class="score-badge">0 / 30</div>
      <div id="analysisTitle" class="analysis-title">Processing...</div>
      <div id="analysisText" class="analysis-text"></div>
      <button class="btn-reset" onclick="resetTest()">Retake Test</button>
    </div>
  </main>

  <script>
    const questions = [
      "How frequently do you feel a profound lack of companionship or meaningful interpersonal alignment?",
      "How often do you feel left out, overlooked, or excluded from social gatherings or circles?",
      "To what extent do you feel isolated, disconnected, or separate from the rest of the world?",
      "How easily can you find someone in your immediate network to talk to when you face a major personal crisis?",
      "How often do you feel that your immediate friends or family members do not truly understand who you are?",
      "How would you describe the overall authenticity and depth of your daily conversational interactions?",
      "How frequently do you feel lonely even when surrounded by a crowded room, party, or office?",
      "Do you feel like you belong to a structured community, collective group, or shared-interest tribe?",
      "How much does a quiet evening or weekend alone spark empty sadness rather than peaceful rejuvenation?",
      "How frequently do you hide your true emotional state out of fear that others won't care or will walk away?"
    ];

    const interpretations = [
      { bound: 8, title: "Deeply Anchored Communal Security (Connected Baseline)", text: "<strong>1. Current Profile:</strong> Your interpersonal metrics show an exceptional layer of emotional connectivity. You have strong relational pillars in place.<br><br><strong>2. Core Psychological Root:</strong> You feel recognized and seen by your inner circle, allowing alone time to serve as peaceful restoration rather than isolation.<br><br><strong>3. Actionable Hack:</strong> Be proactive in maintaining these connections. Schedule a recurring, low-stress check-in or quick coffee with your main support pillars." },
      { bound: 19, title: "Moderate Peripheral Relational Gaps (Casual Isolation)", text: "<strong>1. Current Profile:</strong> You have a steady social presence, but your core interactions might feel somewhat superficial lately, leaving minor unmet emotional gaps.<br><br><strong>2. Core Psychological Root:</strong> A busy schedule or surface-level conversations might be keeping you from sharing your authentic, vulnerable side.<br><br><strong>3. Actionable Hack:</strong> Shift your communication focus from text messages to direct voice or video calls. Replace casual small talk with deeper questions to foster true vulnerable connection." },
      { bound: 30, title: "Severe Existential Emotional Isolation (High Disconnection)", text: "<strong>1. Current Profile:</strong> High isolation markers detected. You feel detached from your immediate circle and empty inside, even when surrounded by crowds.<br><br><strong>2. Core Psychological Root:</strong> You might be reflexively keeping your walls up or masking your feelings out of an underlying fear of being misunderstood or ignored.<br><br><strong>3. Actionable Hack:</strong> Start very small. Engage in low-risk social spaces like local interest clubs, volunteering groups, or online shared-interest communities where connection builds naturally over common goals." }
    ];

    const optionsText = [
      "3 - Almost All the Time / Severely",
      "2 - Frequently / Noticeably",
      "1 - Occasionally / Mildly",
      "0 - Hardly Ever or Never"
    ];
    
    let currentIndex = 0;
    let answerHistory = [];

    function renderQuestion() {
      document.getElementById("progressBar").style.width = (currentIndex / questions.length) * 100 + "%";
      document.getElementById("questionCount").textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      document.getElementById("questionText").textContent = `${currentIndex + 1}. ${questions[currentIndex]}`;
      
      document.getElementById("btnBack").disabled = currentIndex === 0;
      const wrapper = document.getElementById("optionsWrapper");
      wrapper.innerHTML = "";
      
      optionsText.forEach((opt, idx) => {
        const div = document.createElement("div");
        div.className = "option-item";
        div.textContent = opt;
        let scoreWeight = 3 - idx;
        div.onclick = () => selectOption(scoreWeight);
        wrapper.appendChild(div);
      });
    }

    function selectOption(weight) {
      answerHistory[currentIndex] = weight;
      currentIndex++;
      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function showResult() {
      let totalScore = answerHistory.reduce((a, b) => a + b, 0);
      document.getElementById("quizInterface").style.display = "none";
      document.getElementById("resultInterface").style.display = "block";
      document.getElementById("progressBar").style.width = "100%";
      
      document.getElementById("finalScore").textContent = totalScore + " / 30";
      let matched = interpretations.find(i => totalScore <= i.bound) || interpretations[interpretations.length - 1];
      document.getElementById("analysisTitle").textContent = matched.title;
      document.getElementById("analysisText").innerHTML = matched.text;
    }

    function resetTest() {
      currentIndex = 0;
      answerHistory = [];
      document.getElementById("resultInterface").style.display = "none";
      document.getElementById("quizInterface").style.display = "block";
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
